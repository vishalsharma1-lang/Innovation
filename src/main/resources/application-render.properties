# Render.com deployment profile
server.port=${PORT:8080}

spring.datasource.url=${DB_URL:jdbc:h2:file:./data/cmsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASS:}

spring.jpa.database-platform=${JPA_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.properties.hibernate.dialect=${JPA_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update

spring.sql.init.mode=never
spring.h2.console.enabled=false

spring.thymeleaf.cache=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads

sms.provider=none
sms.api.key=
sms.admin.mobile=
youtube.api.key=
