# Server
server.port=8080
spring.application.name=cms-seo-manager

# MySQL (via SSH tunnel to staging.cardekho.com → 10.25.99.1)
# Run tunnel first: ssh -L 3306:10.25.99.1:3306 vishal.sharma1@staging.cardekho.com
spring.datasource.url=${DB_URL:jdbc:h2:file:./data/cmsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASS:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Disable schema.sql auto-run (Hibernate handles tables)
spring.sql.init.mode=never

# H2 Console (local only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads

# Allow Thymeleaf access to request/session
server.servlet.register-default-servlet=true

# YouTube Data API (optional — RSS fallback works without it)
youtube.api.key=

# SMS & Call Configuration
# Provider: fast2sms, msg91, twilio, none
sms.provider=none
sms.api.key=
sms.admin.mobile=
