<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isNew ? 'Add Content' : 'Edit Content'} + ' — CarDekho'">Content Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/admin.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>
<div class="main-content">
    <div th:replace="~{admin/fragments/sidebar :: topbar(${isNew ? 'Add Content Block' : 'Edit Content Block'})}"></div>
    <div class="content-area">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card">
                    <div class="card-header d-flex align-items-center justify-content-between">
                        <h6 class="mb-0 fw-600" th:text="${isNew ? 'Add New Content Block' : 'Edit Content Block'}"></h6>
                        <a th:href="@{/admin/content}" class="btn btn-sm btn-outline-secondary">
                            <i class="fas fa-arrow-left me-1"></i>Back
                        </a>
                    </div>
                    <div class="card-body p-4">
                        <form th:action="@{/admin/content/save}" method="post" th:object="${content}">
                            <input type="hidden" th:field="*{id}">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label">Page Name <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" th:field="*{pageName}"
                                           placeholder="e.g. home, about, services" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Section Name <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" th:field="*{sectionName}"
                                           placeholder="e.g. hero, about, services" required>
                                </div>
                                <div class="col-12">
                                    <label class="form-label">Heading</label>
                                    <input type="text" class="form-control" th:field="*{heading}"
                                           placeholder="Main heading text">
                                </div>
                                <div class="col-12">
                                    <label class="form-label">Subheading</label>
                                    <input type="text" class="form-control" th:field="*{subheading}"
                                           placeholder="Subheading text">
                                </div>
                                <div class="col-12">
                                    <label class="form-label">Description</label>
                                    <textarea class="form-control" th:field="*{description}" rows="4"
                                              placeholder="Content description / body text"></textarea>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Button Text</label>
                                    <input type="text" class="form-control" th:field="*{buttonText}"
                                           placeholder="e.g. Learn More, Get Started">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Button Link</label>
                                    <input type="text" class="form-control" th:field="*{buttonLink}"
                                           placeholder="e.g. /contact or https://...">
                                </div>

                                <!-- Image selector -->
                                <div class="col-12">
                                    <label class="form-label">Content Image</label>
                                    <div class="row g-2 align-items-start">
                                        <div class="col-md-8">
                                            <select class="form-select" id="imageSelect" onchange="previewSelectedImage(this)">
                                                <option value="">— No image —</option>
                                                <option th:each="img : ${images}"
                                                        th:value="${img.imageUrl}"
                                                        th:text="${img.originalName != null ? img.originalName : img.imageName}"
                                                        th:selected="${content.imageUrl != null && content.imageUrl == img.imageUrl}">
                                                </option>
                                            </select>
                                            <input type="hidden" th:field="*{imageUrl}" id="imageUrlInput">
                                        </div>
                                        <div class="col-md-4">
                                            <img id="contentImgPreview" src="" alt="Preview"
                                                 style="max-width:100%;max-height:100px;border-radius:8px;display:none;border:2px solid #e8ecf0">
                                        </div>
                                    </div>
                                    <div class="form-text">
                                        Or <a th:href="@{/admin/images/upload}" target="_blank">upload a new image</a> first.
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label">Status</label>
                                    <select class="form-select" th:field="*{isActive}">
                                        <option value="true">Active</option>
                                        <option value="false">Inactive</option>
                                    </select>
                                </div>
                            </div>

                            <div class="d-flex gap-2 mt-4">
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-save me-1"></i>Save Content
                                </button>
                                <a th:href="@{/admin/content}" class="btn btn-outline-secondary">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/admin.js}"></script>
<script>
    function previewSelectedImage(select) {
        const url = select.value;
        const preview = document.getElementById('contentImgPreview');
        const input = document.getElementById('imageUrlInput');
        input.value = url;
        if (url) {
            preview.src = url;
            preview.style.display = 'block';
        } else {
            preview.style.display = 'none';
        }
    }
    // Init preview if editing
    window.addEventListener('DOMContentLoaded', () => {
        const sel = document.getElementById('imageSelect');
        if (sel && sel.value) previewSelectedImage(sel);
    });
</script>
</body>
</html>
