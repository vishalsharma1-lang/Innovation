<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Management — CarDekho</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/admin.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>
<div class="main-content">
    <div th:replace="~{admin/fragments/sidebar :: topbar('Content Management')}"></div>
    <div class="content-area">

        <div th:if="${success}" class="alert alert-success alert-dismissible mb-4">
            <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible mb-4">
            <i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card">
            <div class="card-header d-flex align-items-center justify-content-between flex-wrap gap-2">
                <h6 class="mb-0 fw-600">Content Blocks</h6>
                <div class="d-flex gap-2">
                    <form th:action="@{/admin/content}" method="get" class="d-flex gap-2">
                        <input type="text" name="search" class="form-control form-control-sm"
                               placeholder="Search content..." th:value="${search}" style="width:200px">
                        <button type="submit" class="btn btn-sm btn-outline-secondary">
                            <i class="fas fa-search"></i>
                        </button>
                    </form>
                    <a th:href="@{/admin/content/new}" class="btn btn-primary btn-sm">
                        <i class="fas fa-plus me-1"></i>Add Content
                    </a>
                </div>
            </div>
            <div class="table-responsive">
                <table class="table">
                    <thead>
                    <tr>
                        <th>#</th>
                        <th>Page / Section</th>
                        <th>Heading</th>
                        <th>Button</th>
                        <th>Status</th>
                        <th>Updated</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="c, stat : ${contentPage.content}">
                        <td th:text="${stat.index + 1 + contentPage.number * contentPage.size}"></td>
                        <td>
                            <span class="badge bg-primary bg-opacity-10 text-primary me-1" th:text="${c.pageName}"></span>
                            <span class="badge bg-secondary bg-opacity-10 text-secondary" th:text="${c.sectionName}"></span>
                        </td>
                        <td>
                            <div class="fw-500" style="font-size:14px" th:text="${#strings.abbreviate(c.heading != null ? c.heading : '-', 35)}"></div>
                            <div class="text-muted" style="font-size:12px" th:text="${#strings.abbreviate(c.subheading != null ? c.subheading : '', 35)}"></div>
                        </td>
                        <td>
                            <a th:if="${c.buttonLink != null}" th:href="${c.buttonLink}" target="_blank"
                               class="text-primary" style="font-size:13px" th:text="${c.buttonText}"></a>
                            <span th:unless="${c.buttonLink != null}" class="text-muted">—</span>
                        </td>
                        <td>
                            <span class="badge rounded-pill"
                                  th:classappend="${c.isActive ? 'badge-active' : 'badge-inactive'}"
                                  th:text="${c.isActive ? 'Active' : 'Inactive'}"></span>
                        </td>
                        <td style="font-size:12px;color:#6c757d"
                            th:text="${c.updatedAt != null ? #temporals.format(c.updatedAt,'MMM dd, yyyy') : '-'}"></td>
                        <td>
                            <div class="d-flex gap-1">
                                <a th:href="@{/admin/content/edit/{id}(id=${c.id})}"
                                   class="btn btn-sm btn-outline-primary">
                                    <i class="fas fa-edit"></i>
                                </a>
                                <form th:action="@{/admin/content/delete/{id}(id=${c.id})}" method="post"
                                      onsubmit="return confirm('Delete this content block?')">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button type="submit" class="btn btn-sm btn-outline-danger">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${contentPage.totalElements == 0}">
                        <td colspan="7" class="text-center text-muted py-4">
                            <i class="fas fa-file-alt fa-2x mb-2 d-block"></i>
                            No content found. <a th:href="@{/admin/content/new}">Add a content block.</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="card-footer d-flex align-items-center justify-content-between" th:if="${contentPage.totalPages > 1}">
                <span class="text-muted" style="font-size:13px">
                    Showing <strong th:text="${contentPage.number * contentPage.size + 1}"></strong>–
                    <strong th:text="${contentPage.number * contentPage.size + contentPage.size > contentPage.totalElements ? contentPage.totalElements : contentPage.number * contentPage.size + contentPage.size}"></strong>
                    of <strong th:text="${contentPage.totalElements}"></strong>
                </span>
                <nav>
                    <ul class="pagination pagination-sm mb-0">
                        <li class="page-item" th:classappend="${contentPage.first ? 'disabled' : ''}">
                            <a class="page-link" th:href="@{/admin/content(page=${contentPage.number - 1}, search=${search})}">‹</a>
                        </li>
                        <li class="page-item" th:each="i : ${#numbers.sequence(0, contentPage.totalPages - 1)}"
                            th:classappend="${i == contentPage.number ? 'active' : ''}">
                            <a class="page-link" th:href="@{/admin/content(page=${i}, search=${search})}" th:text="${i + 1}"></a>
                        </li>
                        <li class="page-item" th:classappend="${contentPage.last ? 'disabled' : ''}">
                            <a class="page-link" th:href="@{/admin/content(page=${contentPage.number + 1}, search=${search})}">›</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/admin.js}"></script>
</body>
</html>
