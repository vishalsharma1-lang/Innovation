<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Image — CarDekho</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/admin.css}" rel="stylesheet">
    <style>
        .drop-zone {
            border: 2px dashed #d1d5db;
            border-radius: 12px;
            padding: 48px 24px;
            text-align: center;
            background: #fafafa;
            cursor: pointer;
            transition: all .3s;
        }
        .drop-zone:hover, .drop-zone.dragover {
            border-color: #FF6B00;
            background: #FFF8F3;
        }
        .drop-zone .drop-icon { font-size: 40px; color: #d1d5db; margin-bottom: 12px; }
        .drop-zone.dragover .drop-icon { color: #FF6B00; }
        #previewArea { margin-top: 20px; }
        #imagePreview { max-width: 300px; max-height: 250px; object-fit: contain; border-radius: 10px; border: 2px solid #e8ecf0; display: none; }
    </style>
</head>
<body>
<div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>
<div class="main-content">
    <div th:replace="~{admin/fragments/sidebar :: topbar('Upload Image')}"></div>
    <div class="content-area">
        <div class="row justify-content-center">
            <div class="col-lg-7">

                <div th:if="${error}" class="alert alert-danger alert-dismissible mb-4">
                    <i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <div class="card">
                    <div class="card-header d-flex align-items-center justify-content-between">
                        <h6 class="mb-0 fw-600">Upload New Image</h6>
                        <a th:href="@{/admin/images}" class="btn btn-sm btn-outline-secondary">
                            <i class="fas fa-arrow-left me-1"></i>Back to Library
                        </a>
                    </div>
                    <div class="card-body p-4">
                        <form th:action="@{/admin/images/upload}" method="post"
                              enctype="multipart/form-data" id="uploadForm">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                            <!-- Drop zone -->
                            <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
                                <div class="drop-icon"><i class="fas fa-cloud-upload-alt"></i></div>
                                <h6 class="mb-1">Drag & drop or click to select</h6>
                                <p class="text-muted mb-0" style="font-size:13px">PNG, JPG, GIF, WebP — max 10MB</p>
                            </div>
                            <input type="file" name="file" id="fileInput" accept="image/*"
                                   style="display:none" onchange="previewFile(this)">

                            <!-- Preview -->
                            <div id="previewArea" class="text-center">
                                <img id="imagePreview" src="" alt="Preview">
                                <div id="fileInfo" class="text-muted mt-2" style="font-size:13px;display:none"></div>
                            </div>

                            <div class="row g-3 mt-2">
                                <div class="col-md-8">
                                    <label class="form-label">Alt Text</label>
                                    <input type="text" name="altText" class="form-control"
                                           placeholder="Describe the image for accessibility">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Category</label>
                                    <select name="category" class="form-select">
                                        <option value="general">General</option>
                                        <option value="banner">Banner</option>
                                        <option value="hero">Hero</option>
                                        <option value="about">About</option>
                                        <option value="services">Services</option>
                                        <option value="team">Team</option>
                                        <option value="portfolio">Portfolio</option>
                                        <option value="blog">Blog</option>
                                        <option value="logo">Logo</option>
                                    </select>
                                </div>
                            </div>

                            <div class="d-flex gap-2 mt-4">
                                <button type="submit" class="btn btn-primary" id="uploadBtn" disabled>
                                    <i class="fas fa-upload me-1"></i>Upload Image
                                </button>
                                <a th:href="@{/admin/images}" class="btn btn-outline-secondary">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/admin.js}"></script>
<script>
    function previewFile(input) {
        const file = input.files[0];
        if (!file) return;

        const preview = document.getElementById('imagePreview');
        const info = document.getElementById('fileInfo');
        const btn = document.getElementById('uploadBtn');

        const reader = new FileReader();
        reader.onload = e => {
            preview.src = e.target.result;
            preview.style.display = 'block';
            info.textContent = file.name + ' (' + (file.size / 1024).toFixed(1) + ' KB)';
            info.style.display = 'block';
            btn.disabled = false;
        };
        reader.readAsDataURL(file);
    }

    // Drag & drop
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');

    dropZone.addEventListener('dragover', e => {
        e.preventDefault();
        dropZone.classList.add('dragover');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        const files = e.dataTransfer.files;
        if (files.length > 0) {
            fileInput.files = files;
            previewFile(fileInput);
        }
    });
</script>
</body>
</html>
