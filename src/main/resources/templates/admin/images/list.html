<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Management — CarDekho</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/admin.css}" rel="stylesheet">
    <style>
        .img-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; }
        .img-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            transition: transform .2s, box-shadow .2s;
        }
        .img-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
        .img-card .img-wrap {
            height: 140px;
            background: #f8f9fa;
            overflow: hidden;
            position: relative;
        }
        .img-card .img-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .img-card .img-info { padding: 10px 12px; }
        .img-card .img-name { font-size: 12px; font-weight: 600; color: #374151; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .img-card .img-meta { font-size: 11px; color: #9ca3af; margin-top: 2px; }
        .img-card .img-actions { display: flex; gap: 6px; margin-top: 8px; }
        .view-toggle .btn { border-radius: 8px; }
        #tableView { display: none; }
    </style>
</head>
<body>
<div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>
<div class="main-content">
    <div th:replace="~{admin/fragments/sidebar :: topbar('Image Management')}"></div>
    <div class="content-area">

        <div th:if="${success}" class="alert alert-success alert-dismissible mb-4">
            <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible mb-4">
            <i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card">
            <div class="card-header d-flex align-items-center justify-content-between flex-wrap gap-2">
                <h6 class="mb-0 fw-600">Image Library</h6>
                <div class="d-flex gap-2 align-items-center">
                    <form th:action="@{/admin/images}" method="get" class="d-flex gap-2">
                        <input type="text" name="search" class="form-control form-control-sm"
                               placeholder="Search images..." th:value="${search}" style="width:200px">
                        <button type="submit" class="btn btn-sm btn-outline-secondary"><i class="fas fa-search"></i></button>
                    </form>
                    <div class="view-toggle d-flex gap-1">
                        <button class="btn btn-sm btn-outline-secondary active" id="gridViewBtn" onclick="toggleView('grid')">
                            <i class="fas fa-th"></i>
                        </button>
                        <button class="btn btn-sm btn-outline-secondary" id="listViewBtn" onclick="toggleView('list')">
                            <i class="fas fa-list"></i>
                        </button>
                    </div>
                    <a th:href="@{/admin/images/upload}" class="btn btn-primary btn-sm">
                        <i class="fas fa-upload me-1"></i>Upload Image
                    </a>
                </div>
            </div>

            <div class="card-body p-4">
                <!-- Grid View -->
                <div id="gridView" class="img-grid">
                    <div th:each="img : ${imagePage.content}" class="img-card">
                        <div class="img-wrap">
                            <img th:src="${img.imageUrl}" th:alt="${img.altText}">
                        </div>
                        <div class="img-info">
                            <div class="img-name" th:text="${img.originalName != null ? img.originalName : img.imageName}"></div>
                            <div class="img-meta">
                                <span th:text="${img.category}"></span>
                                <span th:if="${img.fileSize != null}"> · <span th:text="${#numbers.formatDecimal(img.fileSize / 1024.0, 1, 1)}"></span>KB</span>
                            </div>
                            <div class="img-actions">
                                <a th:href="@{/admin/images/edit/{id}(id=${img.id})}"
                                   class="btn btn-sm btn-outline-primary flex-grow-1">
                                    <i class="fas fa-edit"></i>
                                </a>
                                <button type="button" class="btn btn-sm btn-outline-secondary"
                                        onclick="copyUrl(this)" th:data-url="${img.imageUrl}">
                                    <i class="fas fa-copy"></i>
                                </button>
                                <form th:action="@{/admin/images/delete/{id}(id=${img.id})}" method="post"
                                      onsubmit="return confirm('Delete this image permanently?')">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button type="submit" class="btn btn-sm btn-outline-danger">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                    <div th:if="${imagePage.totalElements == 0}" class="text-center text-muted py-5" style="grid-column: 1/-1">
                        <i class="fas fa-images fa-3x mb-3 d-block"></i>
                        No images uploaded yet.
                        <a th:href="@{/admin/images/upload}">Upload your first image.</a>
                    </div>
                </div>

                <!-- Table / List View -->
                <div id="tableView">
                    <table class="table">
                        <thead><tr>
                            <th>Preview</th><th>Name</th><th>Category</th><th>Size</th><th>URL</th><th>Actions</th>
                        </tr></thead>
                        <tbody>
                        <tr th:each="img : ${imagePage.content}">
                            <td><img th:src="${img.imageUrl}" th:alt="${img.altText}" class="img-thumb"></td>
                            <td>
                                <div class="fw-500" style="font-size:13px" th:text="${img.originalName != null ? img.originalName : img.imageName}"></div>
                                <div class="text-muted" style="font-size:12px" th:text="${img.altText}"></div>
                            </td>
                            <td><span class="badge bg-light text-dark" th:text="${img.category}"></span></td>
                            <td style="font-size:13px"
                                th:text="${img.fileSize != null ? #numbers.formatDecimal(img.fileSize / 1024.0, 1, 1) + ' KB' : '-'}"></td>
                            <td>
                                <code style="font-size:11px" th:text="${img.imageUrl}"></code>
                            </td>
                            <td>
                                <div class="d-flex gap-1">
                                    <a th:href="@{/admin/images/edit/{id}(id=${img.id})}"
                                       class="btn btn-sm btn-outline-primary"><i class="fas fa-edit"></i></a>
                                    <form th:action="@{/admin/images/delete/{id}(id=${img.id})}" method="post"
                                          onsubmit="return confirm('Delete this image?')">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <button type="submit" class="btn btn-sm btn-outline-danger"><i class="fas fa-trash"></i></button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Pagination -->
            <div class="card-footer d-flex align-items-center justify-content-between" th:if="${imagePage.totalPages > 1}">
                <span class="text-muted" style="font-size:13px">
                    <strong th:text="${imagePage.totalElements}"></strong> images total
                </span>
                <nav>
                    <ul class="pagination pagination-sm mb-0">
                        <li class="page-item" th:classappend="${imagePage.first ? 'disabled' : ''}">
                            <a class="page-link" th:href="@{/admin/images(page=${imagePage.number - 1}, search=${search})}">‹</a>
                        </li>
                        <li class="page-item" th:each="i : ${#numbers.sequence(0, imagePage.totalPages - 1)}"
                            th:classappend="${i == imagePage.number ? 'active' : ''}">
                            <a class="page-link" th:href="@{/admin/images(page=${i}, search=${search})}" th:text="${i + 1}"></a>
                        </li>
                        <li class="page-item" th:classappend="${imagePage.last ? 'disabled' : ''}">
                            <a class="page-link" th:href="@{/admin/images(page=${imagePage.number + 1}, search=${search})}">›</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/admin.js}"></script>
<script>
    function toggleView(type) {
        if (type === 'grid') {
            document.getElementById('gridView').style.display = 'grid';
            document.getElementById('tableView').style.display = 'none';
            document.getElementById('gridViewBtn').classList.add('active');
            document.getElementById('listViewBtn').classList.remove('active');
        } else {
            document.getElementById('gridView').style.display = 'none';
            document.getElementById('tableView').style.display = 'block';
            document.getElementById('gridViewBtn').classList.remove('active');
            document.getElementById('listViewBtn').classList.add('active');
        }
    }
    function copyUrl(btn) {
        const url = btn.getAttribute('data-url');
        navigator.clipboard.writeText(window.location.origin + url).then(() => {
            btn.innerHTML = '<i class="fas fa-check"></i>';
            setTimeout(() => btn.innerHTML = '<i class="fas fa-copy"></i>', 2000);
        });
    }
</script>
</body>
</html>
