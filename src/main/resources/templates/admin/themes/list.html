<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme Management — CarDekho</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/admin.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>
<div class="main-content">
    <div th:replace="~{admin/fragments/sidebar :: topbar('Theme Management')}"></div>
    <div class="content-area">

        <div th:if="${success}" class="alert alert-success alert-dismissible mb-4">
            <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span>
            <button class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible mb-4">
            <i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
            <button class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Header row -->
        <div class="d-flex align-items-center justify-content-between mb-4">
            <div>
                <h4 class="fw-700 mb-1" style="color:#111827">Themes</h4>
                <p class="text-muted mb-0" style="font-size:13px">Create and manage visual themes for your website</p>
            </div>
            <a href="/admin/themes/new" class="btn btn-primary btn-sm">
                <i class="fas fa-plus me-1"></i> New Theme
            </a>
        </div>

        <!-- Theme cards grid -->
        <div class="theme-grid">
            <div th:each="t : ${themes}" class="theme-card" th:classappend="${t.active} ? ' is-active' : ''">

                <!-- Active badge -->
                <div th:if="${t.active}" class="active-badge"><i class="fas fa-check-circle"></i> Active</div>

                <!-- Color palette preview -->
                <div class="theme-palette">
                    <div class="swatch" th:style="'background:' + ${t.colorPrimary}"></div>
                    <div class="swatch" th:style="'background:' + ${t.colorDark}"></div>
                    <div class="swatch" th:style="'background:' + ${t.colorSecondary}"></div>
                    <div class="swatch" th:style="'background:' + ${t.colorAccent}"></div>
                    <div class="swatch" th:style="'background:' + ${t.colorBgLight}"></div>
                </div>

                <!-- Theme info -->
                <div class="theme-info">
                    <div class="d-flex align-items-center gap-2 mb-1">
                        <span class="theme-name" th:text="${t.name}">Theme Name</span>
                        <span th:if="${t.default}" class="tag-default">Default</span>
                    </div>
                    <p class="theme-desc" th:text="${t.description ?: 'No description'}"></p>

                    <div class="d-flex gap-2 mt-2 flex-wrap">
                        <span class="font-pill" th:text="${t.fontHeading}">Font</span>
                        <span class="font-pill secondary" th:text="${t.fontBody}">Body</span>
                    </div>

                    <div class="mt-2">
                        <span class="mini-btn"
                              th:style="'background:'+${t.colorPrimary}+';color:#fff;border-radius:'+${t.btnRadius}">
                            Sample Button
                        </span>
                    </div>
                </div>

                <!-- Actions -->
                <div class="theme-actions">
                    <a th:href="@{'/admin/themes/' + ${t.id} + '/edit'}" class="btn btn-sm btn-outline-secondary">
                        <i class="fas fa-edit"></i> Edit
                    </a>
                    <a href="#" class="btn btn-sm btn-outline-primary"
                       th:onclick="'window.open(\'/?preview='+${t.id}+'\', \'_blank\'); return false;'">
                        <i class="fas fa-eye"></i> Preview
                    </a>
                    <form th:if="${!t.active}" th:action="@{'/admin/themes/' + ${t.id} + '/activate'}" method="post" style="display:inline">
                        <button type="submit" class="btn btn-sm btn-success"><i class="fas fa-globe"></i> Publish</button>
                    </form>
                    <form th:if="${!t.active}" th:action="@{'/admin/themes/' + ${t.id} + '/delete'}" method="post" style="display:inline"
                          onsubmit="return confirm('Delete this theme?')">
                        <button type="submit" class="btn btn-sm btn-outline-danger"><i class="fas fa-trash"></i></button>
                    </form>
                </div>
            </div>

            <!-- Empty state -->
            <div th:if="${#lists.isEmpty(themes)}" style="text-align:center;padding:60px 20px;color:#9ca3af;grid-column:1/-1">
                <i class="fas fa-palette" style="font-size:48px;margin-bottom:16px;opacity:0.3"></i>
                <p style="font-size:16px;font-weight:600">No themes yet</p>
                <p>Create your first theme to start customising the website.</p>
                <a href="/admin/themes/new" class="btn btn-primary mt-2">+ Create Theme</a>
            </div>
        </div>

    </div>
</div>

<style>
.theme-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:20px; }
.theme-card { background:#fff; border-radius:14px; border:2px solid #e5e7eb; overflow:hidden; position:relative; transition:box-shadow .2s,border-color .2s; }
.theme-card:hover { box-shadow:0 8px 24px rgba(0,0,0,.1); border-color:#d1d5db; }
.theme-card.is-active { border-color:#FF6B00; box-shadow:0 0 0 3px rgba(255,107,0,.12); }
.active-badge { position:absolute; top:12px; right:12px; background:#FF6B00; color:#fff; font-size:11px; font-weight:700; padding:3px 10px; border-radius:20px; display:flex; align-items:center; gap:4px; }
.theme-palette { display:flex; height:56px; }
.swatch { flex:1; }
.theme-info { padding:14px 16px; }
.theme-name { font-size:15px; font-weight:700; color:#111827; }
.theme-desc { font-size:12.5px; color:#6b7280; margin:4px 0 0; line-height:1.4; }
.tag-default { background:#eff6ff; color:#1d4ed8; font-size:10px; font-weight:700; padding:2px 8px; border-radius:20px; }
.font-pill { background:#f9fafb; border:1px solid #e5e7eb; border-radius:20px; font-size:11px; color:#374151; padding:2px 9px; }
.font-pill.secondary { color:#6b7280; }
.mini-btn { font-size:11px; font-weight:600; padding:5px 14px; display:inline-block; }
.theme-actions { padding:12px 16px; border-top:1px solid #f3f4f6; display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
</style>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
