<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dealer Management — CarDekho</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/admin.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>
<div class="main-content">
    <div th:replace="~{admin/fragments/sidebar :: topbar('Dealer Management')}"></div>
    <div class="content-area">
        <div class="card">
            <div class="card-header d-flex align-items-center justify-content-between">
                <h6 class="mb-0 fw-600">Dealers</h6>
                <div class="d-flex gap-2">
                    <button class="btn btn-outline-success btn-sm" onclick="showFetchDealerModal()"><i class="fas fa-download me-1"></i>Fetch From URL</button>
                    <button class="btn btn-primary btn-sm" onclick="showDealerModal()"><i class="fas fa-plus me-1"></i>Add Dealer</button>
                </div>
            </div>
            <div class="card-body p-0">
                <div id="dealerList" class="p-3"><p class="text-muted text-center"><i class="fas fa-spinner fa-spin me-1"></i>Loading...</p></div>
            </div>
        </div>
    </div>
</div>

<!-- Dealer Modal -->
<div class="modal fade" id="dealerModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title" id="dealerModalTitle">Add Dealer</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <input type="hidden" id="dealerId">
                <div class="row g-3">
                    <div class="col-md-6"><label class="form-label">Dealer Name *</label><input type="text" id="dName" class="form-control" required></div>
                    <div class="col-md-6"><label class="form-label">Brand *</label>
                        <select id="dBrand" class="form-select" required>
                            <option value="">-- Select Brand --</option>
                        </select>
                    </div>
                    <div class="col-md-6"><label class="form-label">Phone</label><input type="tel" id="dPhone" class="form-control"></div>
                    <div class="col-md-6"><label class="form-label">Email</label><input type="email" id="dEmail" class="form-control"></div>
                    <div class="col-md-6"><label class="form-label">City</label><input type="text" id="dCity" class="form-control"></div>
                    <div class="col-md-6"><label class="form-label">State</label><input type="text" id="dState" class="form-control"></div>
                    <div class="col-12"><label class="form-label">Address</label><textarea id="dAddress" class="form-control" rows="2"></textarea></div>
                    <div class="col-md-6"><label class="form-label">Dealer Type</label>
                        <select id="dType" class="form-select"><option value="authorized">Authorized</option><option value="multi-brand">Multi-Brand</option><option value="used-cars">Used Cars</option></select>
                    </div>
                    <div class="col-md-6"><label class="form-label">Logo URL</label><input type="text" id="dLogo" class="form-control" placeholder="https://..."></div>
                    <div class="col-md-6"><label class="form-label">Status</label>
                        <select id="dStatus" class="form-select"><option value="true">Active</option><option value="false">Inactive</option></select>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-primary" onclick="saveDealer()"><i class="fas fa-save me-1"></i>Save</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/admin.js}"></script>
<script>
let vehicleBrands = [];

async function loadBrands() {
    const resp = await fetch('/api/vehicles?size=200');
    const data = await resp.json();
    const vehicles = data.content || data;
    const brandSet = new Set();
    vehicles.forEach(v => { if (v.brand) brandSet.add(v.brand); });
    vehicleBrands = Array.from(brandSet).sort();
    const select = document.getElementById('dBrand');
    select.innerHTML = '<option value="">-- Select Brand --</option>';
    vehicleBrands.forEach(b => { select.innerHTML += `<option value="${b}">${b}</option>`; });
}

function loadDealers() {
    fetch('/api/deals/dealers/all').then(r=>r.json()).then(data => {
        const dealers = data.content || data;
        const container = document.getElementById('dealerList');
        if (!dealers || dealers.length === 0) { container.innerHTML = '<p class="text-muted text-center">No dealers yet.</p>'; return; }
        let html = '<div class="table-responsive"><table class="table"><thead><tr><th>Name</th><th>Brand</th><th>City</th><th>Phone</th><th>Type</th><th>Status</th><th>Actions</th></tr></thead><tbody>';
        dealers.forEach(d => {
            html += `<tr><td class="fw-500">${d.dealerName}</td><td><span class="badge bg-primary">${d.brand||'-'}</span></td><td>${d.city||'-'}</td><td>${d.phone||'-'}</td><td><span class="badge bg-info">${d.dealerType||'-'}</span></td><td><span class="badge ${d.isActive?'badge-active':'badge-inactive'}">${d.isActive?'Active':'Inactive'}</span></td><td><button class="btn btn-sm btn-outline-primary me-1" onclick="editDealer(${d.id})"><i class="fas fa-edit"></i></button><button class="btn btn-sm btn-outline-danger" onclick="deleteDealer(${d.id})"><i class="fas fa-trash"></i></button></td></tr>`;
        });
        html += '</tbody></table></div>';
        container.innerHTML = html;
    });
}
function showDealerModal() {
    document.getElementById('dealerModalTitle').textContent = 'Add Dealer';
    document.getElementById('dealerId').value = '';
    ['dName','dPhone','dEmail','dCity','dState','dAddress','dLogo'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('dBrand').value = '';
    document.getElementById('dType').value = 'authorized';
    document.getElementById('dStatus').value = 'true';
    new bootstrap.Modal(document.getElementById('dealerModal')).show();
}
function editDealer(id) {
    fetch('/api/deals/dealers/all').then(r=>r.json()).then(data => {
        const dealers = data.content || data;
        const d = dealers.find(x => x.id === id); if (!d) return;
        document.getElementById('dealerModalTitle').textContent = 'Edit Dealer';
        document.getElementById('dealerId').value = d.id;
        document.getElementById('dName').value = d.dealerName || '';
        document.getElementById('dBrand').value = d.brand || '';
        document.getElementById('dPhone').value = d.phone || '';
        document.getElementById('dEmail').value = d.email || '';
        document.getElementById('dCity').value = d.city || '';
        document.getElementById('dState').value = d.state || '';
        document.getElementById('dAddress').value = d.address || '';
        document.getElementById('dLogo').value = d.dealerLogo || '';
        document.getElementById('dType').value = d.dealerType || 'authorized';
        document.getElementById('dStatus').value = d.isActive ? 'true' : 'false';
        new bootstrap.Modal(document.getElementById('dealerModal')).show();
    });
}
function saveDealer() {
    const name = document.getElementById('dName').value.trim();
    const brand = document.getElementById('dBrand').value;
    if (!name) { alert('Dealer name is required'); return; }
    if (!brand) { alert('Please select a brand'); return; }
    const id = document.getElementById('dealerId').value;
    const payload = { dealerName: name, brand: brand, phone: document.getElementById('dPhone').value, email: document.getElementById('dEmail').value, city: document.getElementById('dCity').value, state: document.getElementById('dState').value, address: document.getElementById('dAddress').value, dealerLogo: document.getElementById('dLogo').value, dealerType: document.getElementById('dType').value, isActive: document.getElementById('dStatus').value === 'true' };
    const url = id ? `/api/deals/dealers/${id}` : '/api/deals/dealers';
    fetch(url, { method: id ? 'PUT' : 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) })
        .then(r=>r.json()).then(() => { bootstrap.Modal.getInstance(document.getElementById('dealerModal')).hide(); loadDealers(); });
}
function deleteDealer(id) { if(!confirm('Delete?')) return; fetch(`/api/deals/dealers/${id}`,{method:'DELETE'}).then(()=>loadDealers()); }

function showFetchDealerModal() {
    const url = prompt('Enter dealer listing page URL:\n(e.g. https://www.cardekho.com/Maruti/Jaipur/cardealers)');
    if (!url || !url.trim()) return;
    const btn = event.target.closest('button');
    btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin me-1"></i>Fetching...';
    fetch('/api/deals/dealers/fetch-url', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({url: url.trim()}) })
        .then(r => r.json())
        .then(result => {
            btn.disabled = false; btn.innerHTML = '<i class="fas fa-download me-1"></i>Fetch From URL';
            if (result.error) { alert(result.error); return; }

            const allDealers = result.allDealers || [result.data];
            const count = allDealers.length;

            if (count === 1) {
                // Single dealer - open form
                const d = allDealers[0];
                document.getElementById('dealerModalTitle').textContent = 'Add Dealer (Fetched)';
                document.getElementById('dealerId').value = '';
                document.getElementById('dName').value = d.dealerName || '';
                document.getElementById('dBrand').value = d.brand || '';
                document.getElementById('dPhone').value = d.phone || '';
                document.getElementById('dEmail').value = d.email || '';
                document.getElementById('dCity').value = d.city || '';
                document.getElementById('dState').value = d.state || '';
                document.getElementById('dAddress').value = d.address || '';
                document.getElementById('dLogo').value = d.dealerLogo || '';
                document.getElementById('dStatus').value = 'true';
                new bootstrap.Modal(document.getElementById('dealerModal')).show();
            } else {
                // Multiple dealers - ask to import all
                if (confirm(`Found ${count} dealers! Import all ${count} dealers?`)) {
                    importAllDealers(allDealers);
                } else {
                    // Just open first one
                    const d = allDealers[0];
                    document.getElementById('dealerModalTitle').textContent = 'Add Dealer (1 of ' + count + ')';
                    document.getElementById('dealerId').value = '';
                    document.getElementById('dName').value = d.dealerName || '';
                    document.getElementById('dBrand').value = d.brand || '';
                    document.getElementById('dPhone').value = d.phone || '';
                    document.getElementById('dEmail').value = d.email || '';
                    document.getElementById('dCity').value = d.city || '';
                    document.getElementById('dState').value = d.state || '';
                    document.getElementById('dAddress').value = d.address || '';
                    document.getElementById('dLogo').value = d.dealerLogo || '';
                    document.getElementById('dStatus').value = 'true';
                    new bootstrap.Modal(document.getElementById('dealerModal')).show();
                }
            }
        })
        .catch(e => { btn.disabled = false; btn.innerHTML = '<i class="fas fa-download me-1"></i>Fetch From URL'; alert('Error: ' + e.message); });
}

async function importAllDealers(dealers) {
    let saved = 0;
    let failed = 0;
    for (const d of dealers) {
        try {
            const payload = {
                dealerName: d.dealerName,
                brand: d.brand || '',
                phone: d.phone || '',
                email: d.email || '',
                city: d.city || '',
                state: d.state || '',
                address: d.address || '',
                dealerLogo: d.dealerLogo || '',
                dealerType: d.dealerType || 'authorized',
                isActive: true
            };
            const resp = await fetch('/api/deals/dealers', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
            if (resp.ok) saved++; else failed++;
        } catch (e) { failed++; }
    }
    alert(`Import complete!\n✅ Saved: ${saved}\n❌ Failed: ${failed}`);
    loadDealers();
}

document.addEventListener('DOMContentLoaded', function() { loadBrands(); loadDealers(); });
</script>
</body>
</html>
