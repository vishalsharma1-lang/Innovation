<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Car Comparison — CMS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link th:href="@{/css/admin.css}" rel="stylesheet"></head>
<body>
<div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>
<div class="main-content">
<div th:replace="~{admin/fragments/sidebar :: topbar('Car Comparison')}"></div>
<div class="content-area">
    <div class="card">
        <div class="card-header d-flex align-items-center justify-content-between">
            <h6 class="mb-0 fw-600">Compare Vehicles</h6>
        </div>
        <div class="card-body p-4">
            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <label class="form-label">Car 1</label>
                    <select id="car1" class="form-select"><option value="">Select</option>
                        <option th:each="v : ${vehicles}" th:value="${v.id}" th:text="${v.name}"></option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Car 2</label>
                    <select id="car2" class="form-select"><option value="">Select</option>
                        <option th:each="v : ${vehicles}" th:value="${v.id}" th:text="${v.name}"></option>
                    </select>
                </div>
                <div class="col-md-4 d-flex align-items-end">
                    <button onclick="compareNow()" class="btn btn-primary w-100"><i class="fas fa-exchange-alt me-1"></i>Compare</button>
                </div>
            </div>
            <div id="compResult"></div>
        </div>
    </div>
</div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
async function compareNow() {
    const id1 = document.getElementById('car1').value;
    const id2 = document.getElementById('car2').value;
    if (!id1 || !id2) { alert('Select both cars'); return; }
    const r = await fetch(`/api/auto/compare/${id1}/${id2}`);
    const data = await r.json();
    const v1 = data.vehicle1.vehicle, v2 = data.vehicle2.vehicle;
    document.getElementById('compResult').innerHTML = `
        <table class="table"><thead><tr><th>Spec</th><th>${v1.name}</th><th>${v2.name}</th></tr></thead><tbody>
        <tr><td>Price</td><td>₹ ${v1.startingPrice||'-'}</td><td>₹ ${v2.startingPrice||'-'}</td></tr>
        <tr><td>Fuel</td><td>${v1.fuelType||'-'}</td><td>${v2.fuelType||'-'}</td></tr>
        <tr><td>Transmission</td><td>${v1.transmissionType||'-'}</td><td>${v2.transmissionType||'-'}</td></tr>
        <tr><td>Seating</td><td>${v1.seatingCapacity||'-'}</td><td>${v2.seatingCapacity||'-'}</td></tr>
        <tr><td>Category</td><td>${v1.category||'-'}</td><td>${v2.category||'-'}</td></tr>
        </tbody></table>`;
}
</script>
</body></html>
