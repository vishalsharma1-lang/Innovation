<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Dealers — CMS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link th:href="@{/css/admin.css}" rel="stylesheet"></head>
<body>
<div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>
<div class="main-content">
<div th:replace="~{admin/fragments/sidebar :: topbar('Dealer Management')}"></div>
<div class="content-area">
    <div th:if="${success}" class="alert alert-success alert-dismissible mb-3"><span th:text="${success}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
    <div class="row g-4">
        <div class="col-lg-8">
            <div class="card">
                <div class="card-header"><h6 class="mb-0 fw-600">All Dealers</h6></div>
                <div class="table-responsive">
                    <table class="table">
                        <thead><tr><th>Dealer Name</th><th>Brand</th><th>City</th><th>Phone</th><th>Actions</th></tr></thead>
                        <tbody>
                        <tr th:each="d : ${dealers.content}">
                            <td class="fw-500" th:text="${d.dealerName}"></td>
                            <td><span class="badge bg-primary" th:text="${d.brand}"></span></td>
                            <td th:text="${d.city}"></td>
                            <td th:text="${d.phone}"></td>
                            <td>
                                <form th:action="@{/admin/dealers/delete/{id}(id=${d.id})}" method="post" onsubmit="return confirm('Delete?')">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button class="btn btn-sm btn-outline-danger"><i class="fas fa-trash"></i></button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${dealers.totalElements == 0}"><td colspan="5" class="text-center text-muted py-3">No dealers added.</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <div class="col-lg-4">
            <div class="card">
                <div class="card-header"><h6 class="mb-0 fw-600">Add Dealer</h6></div>
                <div class="card-body p-3">
                    <form th:action="@{/admin/dealers/save}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <div class="mb-2"><input type="text" name="dealerName" class="form-control form-control-sm" placeholder="Dealer Name" required></div>
                        <div class="mb-2"><input type="text" name="brand" class="form-control form-control-sm" placeholder="Brand (Tata, Maruti...)"></div>
                        <div class="mb-2"><input type="text" name="city" class="form-control form-control-sm" placeholder="City"></div>
                        <div class="mb-2"><input type="text" name="state" class="form-control form-control-sm" placeholder="State"></div>
                        <div class="mb-2"><input type="text" name="phone" class="form-control form-control-sm" placeholder="Phone"></div>
                        <div class="mb-2"><input type="text" name="address" class="form-control form-control-sm" placeholder="Address"></div>
                        <button class="btn btn-primary btn-sm w-100"><i class="fas fa-plus me-1"></i>Add Dealer</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
