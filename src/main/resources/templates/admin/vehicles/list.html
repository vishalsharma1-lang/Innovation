<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Management — CarDekho</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/admin.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>
<div class="main-content">
    <div th:replace="~{admin/fragments/sidebar :: topbar('Vehicle Management')}"></div>
    <div class="content-area">

        <div th:if="${success}" class="alert alert-success alert-dismissible mb-4">
            <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible mb-4">
            <i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Type Tabs -->
        <ul class="nav nav-tabs mb-0" style="border-bottom:none">
            <li class="nav-item">
                <a class="nav-link" th:classappend="${typeFilter == 'ALL' or typeFilter == null} ? ' active' : ''"
                   th:href="@{/admin/vehicles(typeFilter='ALL')}">
                    <i class="fas fa-list me-1"></i>All
                    <span class="badge bg-secondary ms-1" th:text="${totalAll}">0</span>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:classappend="${typeFilter == 'NEW'} ? ' active' : ''"
                   th:href="@{/admin/vehicles(typeFilter='NEW')}">
                    <i class="fas fa-car me-1"></i>New Cars
                    <span class="badge ms-1" style="background:#16a34a" th:text="${totalNew}">0</span>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:classappend="${typeFilter == 'USED'} ? ' active' : ''"
                   th:href="@{/admin/vehicles(typeFilter='USED')}">
                    <i class="fas fa-car-side me-1"></i>Used Cars
                    <span class="badge ms-1" style="background:#FF5A00" th:text="${totalUsed}">0</span>
                </a>
            </li>
        </ul>

        <div class="card" style="border-top-left-radius:0">
            <div class="card-header d-flex align-items-center justify-content-between flex-wrap gap-2">
                <h6 class="mb-0 fw-600">
                    <span th:if="${typeFilter == 'USED'}"><i class="fas fa-car-side me-1" style="color:#FF5A00"></i>Used Cars</span>
                    <span th:if="${typeFilter == 'NEW'}"><i class="fas fa-car me-1" style="color:#16a34a"></i>New Cars</span>
                    <span th:if="${typeFilter == 'ALL' or typeFilter == null}">All Vehicles</span>
                </h6>
                <div class="d-flex gap-2">
                    <form th:action="@{/admin/vehicles}" method="get" class="d-flex gap-2">
                        <input type="hidden" name="typeFilter" th:value="${typeFilter}">
                        <input type="text" name="search" class="form-control form-control-sm"
                               placeholder="Search vehicles..." th:value="${search}" style="width:200px">
                        <button type="submit" class="btn btn-sm btn-outline-secondary"><i class="fas fa-search"></i></button>
                    </form>
                    <a th:href="@{/admin/vehicles/new(type='USED')}" class="btn btn-sm btn-warning text-white">
                        <i class="fas fa-plus me-1"></i>Add Used Car
                    </a>
                    <a th:href="@{/admin/vehicles/new}" class="btn btn-primary btn-sm">
                        <i class="fas fa-plus me-1"></i>Add New Car
                    </a>
                </div>
            </div>
            <div class="table-responsive">
                <table class="table">
                    <thead>
                    <tr><th>#</th><th>Name</th><th>Type</th><th>Brand</th><th>Category</th><th>Price</th><th>KM / Owner</th><th>Status</th><th>Actions</th></tr>
                    </thead>
                    <tbody>
                    <tr th:each="v, stat : ${vehiclePage.content}">
                        <td th:text="${stat.index + 1 + vehiclePage.number * vehiclePage.size}"></td>
                        <td>
                            <div class="fw-500" th:text="${v.name}"></div>
                            <div class="text-muted" style="font-size:12px" th:text="${v.slug}"></div>
                        </td>
                        <td>
                            <span th:if="${v.vehicleType == 'USED'}" class="badge rounded-pill" style="background:#fff7ed;color:#FF5A00;border:1px solid #FF5A00">Used</span>
                            <span th:unless="${v.vehicleType == 'USED'}" class="badge rounded-pill" style="background:#f0fdf4;color:#16a34a;border:1px solid #16a34a">New</span>
                        </td>
                        <td><span class="badge bg-light text-dark" th:text="${v.brand}"></span></td>
                        <td th:text="${v.category}"></td>
                        <td style="font-size:13px">
                            <span th:if="${v.startingPrice != null}">₹<span th:text="${#numbers.formatDecimal(v.startingPrice, 1, 0)}"></span></span>
                            <span th:unless="${v.startingPrice != null}" class="text-muted">—</span>
                        </td>
                        <td style="font-size:12px;color:#64748b">
                            <span th:if="${v.kmDriven != null}"><i class="fas fa-tachometer-alt me-1"></i><span th:text="${#numbers.formatDecimal(v.kmDriven, 1, 0)}"></span> km</span>
                            <span th:if="${v.ownershipCount != null}" class="ms-1"><i class="fas fa-user me-1"></i><span th:text="${v.ownershipCount}"></span>st owner</span>
                            <span th:if="${v.kmDriven == null and v.ownershipCount == null}" class="text-muted">—</span>
                        </td>
                        <td>
                            <span class="badge rounded-pill"
                                  th:classappend="${v.isActive ? 'badge-active' : 'badge-inactive'}"
                                  th:text="${v.isActive ? 'Active' : 'Inactive'}"></span>
                        </td>
                        <td>
                            <div class="d-flex gap-1">
                                <a th:href="@{/admin/vehicles/manage/{id}(id=${v.id})}" class="btn btn-sm btn-outline-success" title="Manage">
                                    <i class="fas fa-cogs"></i>
                                </a>
                                <a th:href="@{/admin/vehicles/edit/{id}(id=${v.id})}" class="btn btn-sm btn-outline-primary">
                                    <i class="fas fa-edit"></i>
                                </a>
                                <a th:href="${'/vehicles/' + v.slug}" target="_blank" class="btn btn-sm btn-outline-secondary" title="View on site">
                                    <i class="fas fa-external-link-alt"></i>
                                </a>
                                <form th:action="@{/admin/vehicles/delete/{id}(id=${v.id})}" method="post"
                                      onsubmit="return confirm('Delete this vehicle?')">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button type="submit" class="btn btn-sm btn-outline-danger"><i class="fas fa-trash"></i></button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${vehiclePage.totalElements == 0}">
                        <td colspan="9" class="text-center text-muted py-4">
                            <i class="fas fa-car fa-2x mb-2 d-block"></i>
                            No vehicles found. <a th:href="@{/admin/vehicles/new}">Add one.</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
            <div class="card-footer d-flex align-items-center justify-content-between" th:if="${vehiclePage.totalPages > 1}">
                <span class="text-muted" style="font-size:13px"><strong th:text="${vehiclePage.totalElements}"></strong> vehicles</span>
                <nav>
                    <ul class="pagination pagination-sm mb-0">
                        <li class="page-item" th:classappend="${vehiclePage.first ? 'disabled' : ''}">
                            <a class="page-link" th:href="@{/admin/vehicles(page=${vehiclePage.number - 1}, search=${search}, typeFilter=${typeFilter})}">‹</a>
                        </li>
                        <li class="page-item" th:each="i : ${#numbers.sequence(0, vehiclePage.totalPages - 1)}"
                            th:classappend="${i == vehiclePage.number ? 'active' : ''}">
                            <a class="page-link" th:href="@{/admin/vehicles(page=${i}, search=${search}, typeFilter=${typeFilter})}" th:text="${i + 1}"></a>
                        </li>
                        <li class="page-item" th:classappend="${vehiclePage.last ? 'disabled' : ''}">
                            <a class="page-link" th:href="@{/admin/vehicles(page=${vehiclePage.number + 1}, search=${search}, typeFilter=${typeFilter})}">›</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/admin.js}"></script>
</body>
</html>
