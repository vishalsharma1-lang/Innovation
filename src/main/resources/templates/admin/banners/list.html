<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banner Management — CarDekho</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/admin.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>
<div class="main-content">
    <div th:replace="~{admin/fragments/sidebar :: topbar('Banner Management')}"></div>
    <div class="content-area">

        <div th:if="${success}" class="alert alert-success alert-dismissible mb-4">
            <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible mb-4">
            <i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card">
            <div class="card-header d-flex align-items-center justify-content-between flex-wrap gap-2">
                <h6 class="mb-0 fw-600">Banners</h6>
                <div class="d-flex gap-2">
                    <form th:action="@{/admin/banners}" method="get" class="d-flex gap-2">
                        <input type="text" name="search" class="form-control form-control-sm"
                               placeholder="Search banners..." th:value="${search}" style="width:200px">
                        <button type="submit" class="btn btn-sm btn-outline-secondary"><i class="fas fa-search"></i></button>
                    </form>
                    <a th:href="@{/admin/banners/new}" class="btn btn-primary btn-sm">
                        <i class="fas fa-plus me-1"></i>Add Banner
                    </a>
                </div>
            </div>
            <div class="table-responsive">
                <table class="table">
                    <thead>
                    <tr>
                        <th>#</th>
                        <th>Image</th>
                        <th>Page</th>
                        <th>Title</th>
                        <th>Subtitle</th>
                        <th>CTA Button</th>
                        <th>Order</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="b, stat : ${bannerPage.content}">
                        <td th:text="${stat.index + 1 + bannerPage.number * bannerPage.size}"></td>
                        <td>
                            <img th:if="${b.bannerImage != null}" th:src="${b.bannerImage}"
                                 alt="Banner" class="img-thumb">
                            <span th:unless="${b.bannerImage != null}" class="text-muted">—</span>
                        </td>
                        <td><span class="badge bg-primary bg-opacity-10 text-primary" th:text="${b.pageName}"></span></td>
                        <td th:text="${#strings.abbreviate(b.bannerTitle != null ? b.bannerTitle : '-', 30)}"></td>
                        <td class="text-muted" style="font-size:13px"
                            th:text="${#strings.abbreviate(b.bannerSubtitle != null ? b.bannerSubtitle : '-', 30)}"></td>
                        <td style="font-size:13px">
                            <span th:if="${b.ctaButtonText != null}" th:text="${b.ctaButtonText}"></span>
                            <span th:unless="${b.ctaButtonText != null}" class="text-muted">—</span>
                        </td>
                        <td th:text="${b.displayOrder}"></td>
                        <td>
                            <span class="badge rounded-pill"
                                  th:classappend="${b.isActive ? 'badge-active' : 'badge-inactive'}"
                                  th:text="${b.isActive ? 'Active' : 'Inactive'}"></span>
                        </td>
                        <td>
                            <div class="d-flex gap-1">
                                <a th:href="@{/admin/banners/edit/{id}(id=${b.id})}"
                                   class="btn btn-sm btn-outline-primary">
                                    <i class="fas fa-edit"></i>
                                </a>
                                <form th:action="@{/admin/banners/delete/{id}(id=${b.id})}" method="post"
                                      onsubmit="return confirm('Delete this banner?')">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button type="submit" class="btn btn-sm btn-outline-danger">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${bannerPage.totalElements == 0}">
                        <td colspan="9" class="text-center text-muted py-4">
                            <i class="fas fa-images fa-2x mb-2 d-block"></i>
                            No banners found. <a th:href="@{/admin/banners/new}">Create one.</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="card-footer d-flex align-items-center justify-content-between" th:if="${bannerPage.totalPages > 1}">
                <span class="text-muted" style="font-size:13px">
                    Showing <strong th:text="${bannerPage.number * bannerPage.size + 1}"></strong>–
                    <strong th:text="${bannerPage.number * bannerPage.size + bannerPage.size > bannerPage.totalElements ? bannerPage.totalElements : bannerPage.number * bannerPage.size + bannerPage.size}"></strong>
                    of <strong th:text="${bannerPage.totalElements}"></strong>
                </span>
                <nav>
                    <ul class="pagination pagination-sm mb-0">
                        <li class="page-item" th:classappend="${bannerPage.first ? 'disabled' : ''}">
                            <a class="page-link" th:href="@{/admin/banners(page=${bannerPage.number - 1}, search=${search})}">‹</a>
                        </li>
                        <li class="page-item" th:each="i : ${#numbers.sequence(0, bannerPage.totalPages - 1)}"
                            th:classappend="${i == bannerPage.number ? 'active' : ''}">
                            <a class="page-link" th:href="@{/admin/banners(page=${i}, search=${search})}" th:text="${i + 1}"></a>
                        </li>
                        <li class="page-item" th:classappend="${bannerPage.last ? 'disabled' : ''}">
                            <a class="page-link" th:href="@{/admin/banners(page=${bannerPage.number + 1}, search=${search})}">›</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/admin.js}"></script>
</body>
</html>
