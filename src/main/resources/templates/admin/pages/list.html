<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Management — CMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/admin.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>
<div class="main-content">
    <div th:replace="~{admin/fragments/sidebar :: topbar('Page Management')}"></div>
    <div class="content-area">
        <div th:if="${success}" class="alert alert-success alert-dismissible mb-4"><i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible mb-4"><i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>

        <div class="card">
            <div class="card-header d-flex align-items-center justify-content-between flex-wrap gap-2">
                <h6 class="mb-0 fw-600">Dynamic Pages</h6>
                <div class="d-flex gap-2">
                    <form th:action="@{/admin/pages}" method="get" class="d-flex gap-2">
                        <input type="text" name="search" class="form-control form-control-sm" placeholder="Search..." th:value="${search}" style="width:180px">
                        <button type="submit" class="btn btn-sm btn-outline-secondary"><i class="fas fa-search"></i></button>
                    </form>
                    <a th:href="@{/admin/pages/replicate}" class="btn btn-outline-primary btn-sm"><i class="fas fa-clone me-1"></i>Replicate From URL</a>
                    <a th:href="@{/admin/pages/new}" class="btn btn-primary btn-sm"><i class="fas fa-plus me-1"></i>New Page</a>
                </div>
            </div>
            <div class="table-responsive">
                <table class="table">
                    <thead><tr><th>#</th><th>Title</th><th>Slug</th><th>Status</th><th>Template</th><th>Version</th><th>Actions</th></tr></thead>
                    <tbody>
                    <tr th:each="pg, stat : ${pages.content}">
                        <td th:text="${stat.index + 1}"></td>
                        <td class="fw-500" th:text="${pg.title}"></td>
                        <td><code style="font-size:12px" th:text="'/page/' + ${pg.slug}"></code></td>
                        <td>
                            <span class="badge rounded-pill" th:classappend="${pg.status == 'published' ? 'badge-active' : 'bg-warning text-dark'}" th:text="${pg.status}"></span>
                        </td>
                        <td th:text="${pg.templateName != null ? pg.templateName : 'default'}"></td>
                        <td>v<span th:text="${pg.versionNumber}"></span></td>
                        <td>
                            <div class="d-flex gap-1">
                                <a th:href="@{/admin/pages/edit/{id}(id=${pg.id})}" class="btn btn-sm btn-outline-primary"><i class="fas fa-edit"></i></a>
                                <a th:if="${pg.status == 'published'}" th:href="@{/page/{slug}(slug=${pg.slug})}" target="_blank" class="btn btn-sm btn-outline-success"><i class="fas fa-eye"></i></a>
                                <form th:action="@{/admin/pages/delete/{id}(id=${pg.id})}" method="post" onsubmit="return confirm('Delete?')">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button type="submit" class="btn btn-sm btn-outline-danger"><i class="fas fa-trash"></i></button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${pages.totalElements == 0}"><td colspan="7" class="text-center text-muted py-4">No pages yet. <a th:href="@{/admin/pages/new}">Create one.</a></td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
