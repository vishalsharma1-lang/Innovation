<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funnel Analysis — CarDekho</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/admin.css}" rel="stylesheet">
    <style>
        .analytics-card { background:#fff; border-radius:12px; padding:24px; box-shadow:0 1px 4px rgba(0,0,0,.08); }
        .funnel-step { position:relative; margin-bottom:8px; }
        .funnel-bar-wrap { background:#f1f5f9; border-radius:8px; overflow:hidden; height:52px; }
        .funnel-bar-fill { height:100%; background:linear-gradient(90deg,#FF5A00,#ff8c42); border-radius:8px; transition:width 1s; display:flex; align-items:center; padding:0 16px; color:#fff; font-weight:700; min-width:60px; }
        .funnel-label { font-size:13px; color:#334155; margin-bottom:4px; font-weight:600; }
        .funnel-count { font-size:12px; color:#64748b; }
        .step-num { width:24px; height:24px; border-radius:50%; background:#FF5A00; color:#fff; font-size:11px; font-weight:700; display:inline-flex; align-items:center; justify-content:center; margin-right:8px; }
        .conversion-rate { font-size:11px; color:#94a3b8; }
    </style>
</head>
<body>

<div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>

<div class="main-content">
    <div th:replace="~{admin/fragments/sidebar :: topbar('Funnel Analysis')}"></div>

    <div class="content-area">

        <!-- Sub-nav -->
        <div class="mb-4 d-flex gap-2 flex-wrap">
            <a th:href="@{/admin/analytics/overview}" class="btn btn-sm btn-outline-secondary">Overview</a>
            <a th:href="@{/admin/analytics/deals}" class="btn btn-sm btn-outline-secondary">Deal Analytics</a>
            <a th:href="@{/admin/analytics/vehicles}" class="btn btn-sm btn-outline-secondary">Vehicle Analytics</a>
            <a th:href="@{/admin/analytics/funnel}" class="btn btn-sm btn-primary">Funnel</a>
            <a th:href="@{/admin/analytics/search}" class="btn btn-sm btn-outline-secondary">Search</a>
        </div>

        <div class="row g-3">
            <!-- Conversion Funnel -->
            <div class="col-lg-7">
                <div class="analytics-card">
                    <h6 style="font-weight:700" class="mb-4"><i class="fas fa-filter text-warning me-2"></i>Conversion Funnel</h6>

                    <div th:with="topCount=${data['funnel'][0]['count']}">
                        <div th:each="step,stat : ${data['funnel']}" class="funnel-step">
                            <div class="d-flex align-items-center mb-1">
                                <span class="step-num" th:text="${stat.count + 1}">1</span>
                                <span class="funnel-label" th:text="${step['label']}">Step</span>
                                <span class="ms-auto funnel-count" th:text="${step['count']} + ' events'">0 events</span>
                            </div>
                            <div class="funnel-bar-wrap">
                                <div class="funnel-bar-fill"
                                     th:style="'width:' + (${topCount > 0 ? step['count'] * 100 / topCount : 0}) + '%'"
                                     th:text="${step['count']}">0</div>
                            </div>
                        </div>
                    </div>

                    <div th:if="${#lists.isEmpty(data['funnel'])}" class="text-center text-muted py-5">
                        No funnel data yet.
                    </div>
                </div>
            </div>

            <!-- All Event Counts -->
            <div class="col-lg-5">
                <div class="analytics-card h-100">
                    <h6 style="font-weight:700" class="mb-3">All Event Types</h6>
                    <div class="table-responsive">
                        <table class="table table-sm">
                            <thead class="table-light">
                                <tr><th>Event</th><th class="text-end">Count</th></tr>
                            </thead>
                            <tbody>
                                <tr th:each="row : ${data['eventCounts']}">
                                    <td style="font-size:13px" th:text="${row[0]}">-</td>
                                    <td class="text-end fw-bold" th:text="${row[1]}">0</td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(data['eventCounts'])}">
                                    <td colspan="2" class="text-center text-muted">No events yet.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
