<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Analytics — CarDekho</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/admin.css}" rel="stylesheet">
    <style>
        .analytics-card { background:#fff; border-radius:12px; padding:24px; box-shadow:0 1px 4px rgba(0,0,0,.08); }
        .metric-val { font-size:2rem; font-weight:700; color:#0f172a; }
        .metric-label { font-size:12px; color:#64748b; text-transform:uppercase; letter-spacing:.5px; margin-top:2px; }
        .metric-icon { width:48px; height:48px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:20px; }
        .query-chip { background:#f1f5f9; border-radius:20px; padding:6px 14px; display:inline-flex; align-items:center; gap:8px; margin-bottom:8px; }
    </style>
</head>
<body>

<div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>

<div class="main-content">
    <div th:replace="~{admin/fragments/sidebar :: topbar('Search Analytics')}"></div>

    <div class="content-area">

        <!-- Sub-nav -->
        <div class="mb-4 d-flex gap-2 flex-wrap">
            <a th:href="@{/admin/analytics/overview}" class="btn btn-sm btn-outline-secondary">Overview</a>
            <a th:href="@{/admin/analytics/deals}" class="btn btn-sm btn-outline-secondary">Deal Analytics</a>
            <a th:href="@{/admin/analytics/vehicles}" class="btn btn-sm btn-outline-secondary">Vehicle Analytics</a>
            <a th:href="@{/admin/analytics/funnel}" class="btn btn-sm btn-outline-secondary">Funnel</a>
            <a th:href="@{/admin/analytics/search}" class="btn btn-sm btn-primary">Search</a>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <div class="analytics-card">
                    <div class="d-flex align-items-center gap-3">
                        <div class="metric-icon" style="background:#f0fdf4;color:#16a34a"><i class="fas fa-search"></i></div>
                        <div>
                            <div class="metric-val" th:text="${data['totalSearches']}">0</div>
                            <div class="metric-label">Total Searches</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Top Queries Table -->
        <div class="analytics-card">
            <h6 style="font-weight:700" class="mb-3"><i class="fas fa-search me-2 text-success"></i>Top Search Queries</h6>
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead class="table-light">
                        <tr>
                            <th>#</th>
                            <th>Search Query</th>
                            <th class="text-end">Count</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="row,stat : ${data['topQueries']}">
                            <td class="text-muted" th:text="${stat.count}">1</td>
                            <td>
                                <i class="fas fa-search me-2 text-muted" style="font-size:12px"></i>
                                <span th:text="${row[0]}">query</span>
                            </td>
                            <td class="text-end">
                                <span class="badge" style="background:#fff7ed;color:#FF5A00" th:text="${row[1]}">0</span>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(data['topQueries'])}">
                            <td colspan="3" class="text-center text-muted py-5">
                                <i class="fas fa-search fa-3x mb-3 d-block" style="color:#e2e8f0"></i>
                                No search queries recorded yet.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
