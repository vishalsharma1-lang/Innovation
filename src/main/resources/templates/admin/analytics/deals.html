<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deal Analytics — CarDekho</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/admin.css}" rel="stylesheet">
    <style>
        .analytics-card { background:#fff; border-radius:12px; padding:24px; box-shadow:0 1px 4px rgba(0,0,0,.08); }
        .metric-val { font-size:2rem; font-weight:700; color:#0f172a; }
        .metric-label { font-size:12px; color:#64748b; text-transform:uppercase; letter-spacing:.5px; margin-top:2px; }
        .metric-icon { width:48px; height:48px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:20px; }
        .rank-num { width:28px; height:28px; border-radius:50%; background:#fff7ed; color:#FF5A00; font-weight:700; font-size:13px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    </style>
</head>
<body>

<div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>

<div class="main-content">
    <div th:replace="~{admin/fragments/sidebar :: topbar('Deal Analytics')}"></div>

    <div class="content-area">

        <!-- Sub-nav -->
        <div class="mb-4 d-flex gap-2 flex-wrap">
            <a th:href="@{/admin/analytics/overview}" class="btn btn-sm btn-outline-secondary">Overview</a>
            <a th:href="@{/admin/analytics/deals}" class="btn btn-sm btn-primary">Deal Analytics</a>
            <a th:href="@{/admin/analytics/vehicles}" class="btn btn-sm btn-outline-secondary">Vehicle Analytics</a>
            <a th:href="@{/admin/analytics/funnel}" class="btn btn-sm btn-outline-secondary">Funnel</a>
            <a th:href="@{/admin/analytics/search}" class="btn btn-sm btn-outline-secondary">Search</a>
        </div>

        <!-- KPI Cards -->
        <div class="row g-3 mb-4">
            <div class="col-6 col-xl-3">
                <div class="analytics-card">
                    <div class="d-flex align-items-center gap-3">
                        <div class="metric-icon" style="background:#fff7ed;color:#FF5A00"><i class="fas fa-hand-pointer"></i></div>
                        <div>
                            <div class="metric-val" th:text="${data['dealClicks']}">0</div>
                            <div class="metric-label">Deal Clicks</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-6 col-xl-3">
                <div class="analytics-card">
                    <div class="d-flex align-items-center gap-3">
                        <div class="metric-icon" style="background:#f0fdf4;color:#16a34a"><i class="fas fa-eye"></i></div>
                        <div>
                            <div class="metric-val" th:text="${data['detailViews']}">0</div>
                            <div class="metric-label">Detail Views</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-6 col-xl-3">
                <div class="analytics-card">
                    <div class="d-flex align-items-center gap-3">
                        <div class="metric-icon" style="background:#eff6ff;color:#2563eb"><i class="fas fa-tag"></i></div>
                        <div>
                            <div class="metric-val" th:text="${data['getBestPrice']}">0</div>
                            <div class="metric-label">Get Best Price</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-6 col-xl-3">
                <div class="analytics-card">
                    <div class="d-flex align-items-center gap-3">
                        <div class="metric-icon" style="background:#f0fdf4;color:#15803d"><i class="fab fa-whatsapp"></i></div>
                        <div>
                            <div class="metric-val" th:text="${data['whatsappClicks']}">0</div>
                            <div class="metric-label">WhatsApp Clicks</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Top Deals by Clicks -->
        <div class="analytics-card">
            <h6 style="font-weight:700" class="mb-3"><i class="fas fa-fire text-warning me-2"></i>Top Deals by Clicks</h6>
            <div th:each="row,stat : ${data['topDeals']}" class="d-flex align-items-center gap-3 mb-3 p-3 rounded" style="background:#f8fafc">
                <div class="rank-num" th:text="${stat.count}">1</div>
                <div class="flex-grow-1">
                    <div class="fw-bold" th:text="${row[1] != null ? row[1] : 'Deal #' + row[0]}">Deal Name</div>
                    <div class="text-muted" style="font-size:12px">ID: <span th:text="${row[0]}">0</span></div>
                </div>
                <div class="text-end">
                    <div class="fw-bold text-orange" style="color:#FF5A00;font-size:1.2rem" th:text="${row[2]}">0</div>
                    <div style="font-size:11px;color:#94a3b8">clicks</div>
                </div>
            </div>
            <div th:if="${#lists.isEmpty(data['topDeals'])}" class="text-center text-muted py-5">
                <i class="fas fa-chart-bar fa-3x mb-3 d-block" style="color:#e2e8f0"></i>
                No deal clicks recorded yet. Add <code>onclick="trackEvent('deal_click', ...)"</code> to deal cards.
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
