<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — CarDekho CMS</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: linear-gradient(135deg, #111827 0%, #1F2937 50%, #374151 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .card {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .logo {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, #FF6B00, #FF8C38);
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 24px;
            font-size: 28px; color: white;
            box-shadow: 0 8px 24px rgba(255,107,0,0.3);
        }
        h2 { color: #fff; font-weight: 700; text-align: center; margin-bottom: 8px; font-size: 24px; }
        .subtitle { color: rgba(255,255,255,0.5); text-align: center; margin-bottom: 32px; font-size: 14px; }
        .alert {
            padding: 12px 16px; border-radius: 10px; font-size: 14px;
            margin-bottom: 20px;
        }
        .alert-error { background: rgba(239,68,68,0.2); border: 1px solid rgba(239,68,68,0.4); color: #fca5a5; }
        .alert-success { background: rgba(34,197,94,0.2); border: 1px solid rgba(34,197,94,0.4); color: #86efac; }
        .field { margin-bottom: 20px; }
        label { display: block; color: rgba(255,255,255,0.8); font-size: 14px; font-weight: 500; margin-bottom: 8px; }
        input[type="text"], input[type="password"] {
            width: 100%;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            border-radius: 10px;
            padding: 13px 16px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input[type="text"]:focus, input[type="password"]:focus {
            border-color: #FF6B00;
            box-shadow: 0 0 0 3px rgba(255,107,0,0.2);
        }
        input::placeholder { color: rgba(255,255,255,0.3); }
        button {
            width: 100%;
            background: linear-gradient(135deg, #FF6B00, #FF8C38);
            border: none;
            border-radius: 10px;
            padding: 14px;
            font-weight: 600;
            font-size: 16px;
            color: white;
            cursor: pointer;
            margin-top: 8px;
            box-shadow: 0 4px 12px rgba(255,107,0,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(255,107,0,0.4); }
        .hint { color: rgba(255,255,255,0.4); text-align: center; margin-top: 24px; font-size: 13px; }
        .hint strong { color: rgba(255,255,255,0.7); }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">⚡</div>
    <h2>CarDekho CMS</h2>
    <p class="subtitle">Sign in to your admin panel</p>

    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

    <form th:action="@{/admin/login}" method="post">
        <div class="field">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Enter username" required autofocus>
        </div>
        <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter password" required>
        </div>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit">Sign In</button>
    </form>

    <p class="hint">Default: <strong>admin</strong> / <strong>admin123</strong></p>
</div>
</body>
</html>
