<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — CarDekho</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #111827 0%, #1F2937 50%, #374151 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', -apple-system, sans-serif;
        }
        .login-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .brand-logo {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #FF6B00, #FF8C38);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 28px;
            color: white;
            box-shadow: 0 8px 24px rgba(255,107,0,0.3);
        }
        h2 { color: #fff; font-weight: 700; text-align: center; margin-bottom: 8px; }
        .subtitle { color: rgba(255,255,255,0.5); text-align: center; margin-bottom: 32px; font-size: 14px; }
        .form-label { color: rgba(255,255,255,0.8); font-size: 14px; font-weight: 500; margin-bottom: 6px; }
        .form-control {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            border-radius: 10px;
            padding: 12px 16px;
            transition: all .3s;
        }
        .form-control:focus {
            background: rgba(255,255,255,0.12);
            border-color: #FF6B00;
            color: white;
            box-shadow: 0 0 0 3px rgba(255,107,0,0.2);
        }
        .form-control::placeholder { color: rgba(255,255,255,0.3); }
        .input-group-text {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-right: none;
            color: rgba(255,255,255,0.5);
        }
        .input-group .form-control { border-left: none; }
        .btn-login {
            background: linear-gradient(135deg, #FF6B00, #FF8C38);
            border: none;
            border-radius: 10px;
            padding: 13px;
            font-weight: 600;
            font-size: 16px;
            width: 100%;
            color: white;
            transition: all .3s;
            margin-top: 8px;
            box-shadow: 0 4px 12px rgba(255,107,0,0.3);
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(255,107,0,0.4); color: white; }
        .alert { border-radius: 10px; font-size: 14px; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="brand-logo"><i class="fas fa-bolt"></i></div>
    <h2>CarDekho CMS</h2>
    <p class="subtitle">Sign in to your admin panel</p>

    <div th:if="${error}" class="alert alert-danger">
        <i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
    </div>
    <div th:if="${message}" class="alert alert-success">
        <i class="fas fa-check-circle me-2"></i><span th:text="${message}"></span>
    </div>

    <form th:action="@{/admin/login}" method="post">
        <div class="mb-4">
            <label class="form-label">Username</label>
            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-user"></i></span>
                <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus>
            </div>
        </div>
        <div class="mb-4">
            <label class="form-label">Password</label>
            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                <input type="password" name="password" class="form-control" placeholder="Enter password" required>
            </div>
        </div>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit" class="btn btn-login">
            <i class="fas fa-sign-in-alt me-2"></i>Sign In
        </button>
    </form>

    <p style="color:rgba(255,255,255,0.4); text-align:center; margin-top:24px; font-size:13px;">
        Default: <strong style="color:rgba(255,255,255,0.7)">admin</strong> /
        <strong style="color:rgba(255,255,255,0.7)">admin123</strong>
    </p>
</div>
</body>
</html>
