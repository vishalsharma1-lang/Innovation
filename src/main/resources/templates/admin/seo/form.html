<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isNew ? 'Add SEO' : 'Edit SEO'} + ' — CarDekho'">SEO Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/admin.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>
<div class="main-content">
    <div th:replace="~{admin/fragments/sidebar :: topbar(${isNew ? 'Add SEO Settings' : 'Edit SEO Settings'})}"></div>
    <div class="content-area">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card">
                    <div class="card-header d-flex align-items-center justify-content-between">
                        <h6 class="mb-0 fw-600" th:text="${isNew ? 'Add New SEO Settings' : 'Edit SEO Settings'}"></h6>
                        <a th:href="@{/admin/seo}" class="btn btn-sm btn-outline-secondary">
                            <i class="fas fa-arrow-left me-1"></i>Back
                        </a>
                    </div>
                    <div class="card-body p-4">
                        <!-- Fetch SEO from URL -->
                        <div class="mb-4 p-3" style="background:#f0f2ff;border-radius:10px;border:1px solid #e0e7ff">
                            <label class="form-label fw-600"><i class="fas fa-globe me-1 text-primary"></i>Auto-fetch SEO from URL</label>
                            <div class="input-group">
                                <input type="url" id="fetchUrl" class="form-control" placeholder="https://www.example.com/page">
                                <button type="button" class="btn btn-primary" onclick="fetchSeoFromUrl()">
                                    <i class="fas fa-download me-1"></i>Fetch
                                </button>
                            </div>
                            <div id="fetchStatus" class="form-text mt-1"></div>
                        </div>
                        <form th:action="@{/admin/seo/save}" method="post" th:object="${seo}">
                            <input type="hidden" th:field="*{id}">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label">Page Name <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" th:field="*{pageName}"
                                           placeholder="e.g. home, about, services" required>
                                    <div class="form-text">Unique identifier for the page</div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Robots</label>
                                    <select class="form-select" th:field="*{robots}">
                                        <option value="index, follow">index, follow</option>
                                        <option value="noindex, nofollow">noindex, nofollow</option>
                                        <option value="index, nofollow">index, nofollow</option>
                                        <option value="noindex, follow">noindex, follow</option>
                                    </select>
                                </div>
                                <div class="col-12">
                                    <label class="form-label">SEO Title</label>
                                    <input type="text" class="form-control" th:field="*{seoTitle}"
                                           placeholder="Page title for search engines (50-60 chars recommended)">
                                    <div class="form-text char-counter" data-max="60">
                                        <span class="char-count">0</span>/60 characters
                                    </div>
                                </div>
                                <div class="col-12">
                                    <label class="form-label">Meta Description</label>
                                    <textarea class="form-control" th:field="*{metaDescription}" rows="3"
                                              placeholder="Brief description for search results (150-160 chars)"></textarea>
                                    <div class="form-text char-counter" data-max="160">
                                        <span class="char-count">0</span>/160 characters
                                    </div>
                                </div>
                                <div class="col-12">
                                    <label class="form-label">Keywords</label>
                                    <input type="text" class="form-control" th:field="*{keywords}"
                                           placeholder="keyword1, keyword2, keyword3">
                                </div>
                                <div class="col-12">
                                    <label class="form-label">Canonical URL</label>
                                    <input type="url" class="form-control" th:field="*{canonicalUrl}"
                                           placeholder="https://example.com/page">
                                </div>

                                <div class="col-12"><hr class="my-1"><label class="form-label text-muted fw-600">Open Graph Settings</label></div>

                                <div class="col-12">
                                    <label class="form-label">OG Title</label>
                                    <input type="text" class="form-control" th:field="*{ogTitle}"
                                           placeholder="Title for social media sharing">
                                </div>
                                <div class="col-12">
                                    <label class="form-label">OG Description</label>
                                    <textarea class="form-control" th:field="*{ogDescription}" rows="2"
                                              placeholder="Description for social media sharing"></textarea>
                                </div>
                            </div>

                            <div class="d-flex gap-2 mt-4">
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-save me-1"></i>Save SEO Settings
                                </button>
                                <a th:href="@{/admin/seo}" class="btn btn-outline-secondary">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/admin.js}"></script>
<script>
async function fetchSeoFromUrl() {
    const url = document.getElementById('fetchUrl').value.trim();
    const status = document.getElementById('fetchStatus');
    if (!url) { status.innerHTML = '<span class="text-danger">Enter a URL</span>'; return; }

    status.innerHTML = '<span class="text-primary"><i class="fas fa-spinner fa-spin me-1"></i>Fetching SEO data...</span>';

    try {
        const resp = await fetch('/api/admin/seo/fetch-url', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url: url })
        });
        const data = await resp.json();
        if (data.error) { status.innerHTML = '<span class="text-danger">' + data.error + '</span>'; return; }

        // Auto-fill form fields
        if (data.seoTitle) document.getElementById('seoTitle').value = data.seoTitle;
        if (data.metaDescription) document.getElementById('metaDescription').value = data.metaDescription;
        if (data.keywords) document.getElementById('keywords').value = data.keywords;
        if (data.canonicalUrl) document.getElementById('canonicalUrl').value = data.canonicalUrl;
        if (data.robots) document.getElementById('robots').value = data.robots;
        if (data.ogTitle) document.getElementById('ogTitle').value = data.ogTitle;
        if (data.ogDescription) document.getElementById('ogDescription').value = data.ogDescription;

        status.innerHTML = '<span class="text-success"><i class="fas fa-check-circle me-1"></i>SEO data fetched! Review and save.</span>';
    } catch(e) {
        status.innerHTML = '<span class="text-danger">Error: ' + e.message + '</span>';
    }
}
</script>
</body>
</html>
