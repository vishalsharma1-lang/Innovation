<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${seo?.seoTitle != null ? seo.seoTitle : 'Portfolio'}">Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/website.css}" rel="stylesheet">
    <link th:href="@{/css/theme.css}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark fixed-top" id="mainNav">
    <div class="container">
        <a class="navbar-brand fw-700" href="/"><i class="fas fa-bolt me-2"></i>CarDekho Deals</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="/about">About</a></li>
                <li class="nav-item"><a class="nav-link" href="/services">Services</a></li>
                <li class="nav-item"><a class="nav-link active" href="/portfolio">Portfolio</a></li>
                <li class="nav-item"><a class="nav-link" href="/contact">Contact</a></li>
            </ul>
        </div>
    </div>
</nav>
<section class="page-hero">
    <div class="container text-center">
        <h1>Our Portfolio</h1>
        <p>A selection of our best work</p>
    </div>
</section>
<section class="section-pad bg-light">
    <div class="container">
        <div class="row g-4">
            <div th:each="c : ${contentList}" th:unless="${c.sectionName == 'hero'}" class="col-md-4">
                <div class="service-card overflow-hidden p-0">
                    <img th:if="${c.imageUrl != null}" th:src="${c.imageUrl}"
                         alt="Project" class="img-fluid" style="height:220px;object-fit:cover;width:100%">
                    <div class="p-4">
                        <h5 th:text="${c.heading}"></h5>
                        <p class="text-muted" style="font-size:14px" th:text="${#strings.abbreviate(c.description != null ? c.description : '', 100)}"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
<footer class="site-footer">
    <div class="container text-center footer-copy">&copy; 2024 CarDekho Deals. All rights reserved.</div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/website.js}"></script>
</body>
</html>
