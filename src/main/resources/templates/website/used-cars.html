<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Used Cars — Best Deals &amp; Offers</title>
    <meta name="description" content="Browse verified used car deals from Spinny, Cars24, OLX and authorized dealers. Best prices, 1st owner cars, certified pre-owned vehicles.">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/website.css}">
    <style>
        .uc-hero {
            background: linear-gradient(135deg,#0f172a 0%,#1e293b 60%,#0f172a 100%);
            padding: 48px 0 56px; position:relative; overflow:hidden;
        }
        .uc-hero::before {
            content:''; position:absolute; inset:0;
            background:radial-gradient(ellipse 60% 80% at 50% 0%,rgba(239,74,35,.15) 0%,transparent 70%);
        }
        .uc-hero-badge {
            display:inline-flex; align-items:center; gap:6px;
            background:rgba(239,74,35,.15); border:1px solid rgba(239,74,35,.3);
            color:#ff9a00; padding:4px 14px; border-radius:20px;
            font-size:11px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; margin-bottom:16px;
        }
        .uc-hero h1 { font-size:clamp(24px,4vw,40px); font-weight:800; color:#fff; margin-bottom:10px; }
        .uc-hero h1 span { color:#EF4A23; }
        .uc-hero p { color:#94a3b8; font-size:15px; }

        .uc-filters {
            background:#fff; border-bottom:1px solid #e2e8f0;
            position:sticky; top:0; z-index:50; padding:12px 0;
            box-shadow:0 2px 8px rgba(0,0,0,.06);
        }
        .uc-filter-row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
        .uc-chip {
            border:1.5px solid #dee2e6; border-radius:20px;
            padding:5px 14px; font-size:13px; font-weight:600;
            cursor:pointer; background:#fff; color:#495057; transition:all .15s; white-space:nowrap;
        }
        .uc-chip.active { background:#EF4A23; border-color:#EF4A23; color:#fff; }
        .uc-chip:hover:not(.active) { border-color:#EF4A23; color:#EF4A23; }
        .uc-select {
            border:1.5px solid #dee2e6; border-radius:8px;
            padding:5px 12px; font-size:13px; font-weight:500;
            color:#495057; background:#fff; cursor:pointer; outline:none;
        }
        .uc-select:focus { border-color:#EF4A23; }

        .uc-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:20px; }

        .uc-card {
            background:#fff; border:1.5px solid #e2e8f0; border-radius:16px;
            overflow:hidden; transition:transform .2s,box-shadow .2s;
            box-shadow:0 2px 8px rgba(0,0,0,.06);
        }
        .uc-card:hover { transform:translateY(-4px); box-shadow:0 12px 32px rgba(0,0,0,.12); }

        .uc-card-img {
            height:190px; background:linear-gradient(135deg,#f1f5f9,#e2e8f0);
            display:flex; align-items:center; justify-content:center;
            position:relative; overflow:hidden;
        }
        .uc-card-img .no-img { font-size:52px; color:#cbd5e1; }
        .uc-deal-tag {
            position:absolute; top:10px; left:10px;
            padding:3px 10px; border-radius:20px;
            font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.4px;
        }
        .tag-BEST_DEAL  { background:#dcfce7; color:#15803d; }
        .tag-GOOD_DEAL  { background:#dbeafe; color:#1d4ed8; }
        .tag-NORMAL     { background:#f1f5f9; color:#64748b; }
        .tag-OVERPRICED { background:#fee2e2; color:#dc2626; }
        .uc-source {
            position:absolute; top:10px; right:10px;
            background:rgba(15,23,42,.7); color:#fff;
            font-size:10px; font-weight:700; padding:3px 8px; border-radius:6px; text-transform:uppercase;
        }

        .uc-card-body { padding:14px 16px; }
        .uc-car-name { font-size:16px; font-weight:700; color:#0f172a; margin-bottom:2px; }
        .uc-variant { font-size:12px; color:#64748b; margin-bottom:10px; }

        .uc-specs { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
        .uc-spec {
            background:#f8fafc; border:1px solid #e2e8f0; border-radius:6px;
            padding:3px 8px; font-size:11px; font-weight:600; color:#475057;
            display:flex; align-items:center; gap:4px;
        }
        .uc-spec i { font-size:10px; color:#EF4A23; }

        .uc-price-row { display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:10px; }
        .uc-price { font-size:22px; font-weight:800; color:#EF4A23; }
        .uc-score-num { font-size:18px; font-weight:800; color:#0059A8; }
        .uc-score-label { font-size:10px; color:#94a3b8; text-transform:uppercase; letter-spacing:.3px; }
        .uc-score-bar { height:4px; border-radius:2px; background:#e2e8f0; margin-bottom:10px; }
        .uc-score-fill { height:100%; border-radius:2px; }

        .uc-meta { display:flex; justify-content:space-between; align-items:center; font-size:11px; color:#64748b; }
        .uc-cta { display:flex; gap:6px; margin-top:10px; }
        .uc-btn-primary {
            flex:1; background:#EF4A23; color:#fff;
            border:none; border-radius:8px; padding:9px 0;
            font-size:13px; font-weight:700; cursor:pointer; transition:background .15s;
        }
        .uc-btn-primary:hover { background:#d63b17; }
        .uc-btn-outline {
            background:#fff; color:#EF4A23; border:1.5px solid #EF4A23;
            border-radius:8px; padding:8px 14px; font-size:13px; font-weight:600;
            cursor:pointer; transition:all .15s; text-decoration:none;
            display:flex; align-items:center;
        }
        .uc-btn-outline:hover { background:#EF4A23; color:#fff; }

        .uc-stats {
            background:#fff; border-radius:12px; border:1px solid #e2e8f0;
            padding:16px 20px; display:flex; gap:24px; align-items:center;
            flex-wrap:wrap; margin-bottom:20px; box-shadow:0 1px 4px rgba(0,0,0,.05);
        }
        .uc-stat .num { font-size:20px; font-weight:800; color:#EF4A23; }
        .uc-stat .lbl { font-size:11px; color:#94a3b8; text-transform:uppercase; letter-spacing:.4px; }
        .uc-empty { text-align:center; padding:60px 20px; color:#94a3b8; grid-column:1/-1; }
        .uc-empty i { font-size:48px; margin-bottom:16px; display:block; }
        .uc-empty h4 { font-size:18px; font-weight:700; color:#475057; }
    </style>
</head>
<body>
<div th:replace="~{website/fragments/layout :: nav('used-cars')}"></div>

<!-- HERO -->
<section class="uc-hero">
    <div class="container" style="position:relative">
        <div class="text-center">
            <div class="uc-hero-badge"><i class="fas fa-recycle"></i> Verified Used Cars</div>
            <h1>Used Cars with <span>Best Deals</span></h1>
            <p>Certified pre-owned cars from Spinny, Cars24, OLX &amp; authorized dealers<br>All listings scored and verified for best value</p>
        </div>
    </div>
</section>

<!-- FILTERS -->
<div class="uc-filters">
    <div class="container">
        <div class="uc-filter-row">
            <span class="uc-chip active" onclick="filterCards('ALL',this)">All</span>
            <span class="uc-chip" data-tag="BEST_DEAL" onclick="filterCards('BEST_DEAL',this)">🏆 Best Deal</span>
            <span class="uc-chip" data-tag="GOOD_DEAL" onclick="filterCards('GOOD_DEAL',this)">👍 Good Deal</span>
            <span class="uc-chip" data-fuel="Petrol" onclick="filterCards('fuel:Petrol',this)"><i class="fas fa-gas-pump"></i> Petrol</span>
            <span class="uc-chip" data-fuel="Diesel" onclick="filterCards('fuel:Diesel',this)"><i class="fas fa-gas-pump"></i> Diesel</span>
            <span class="uc-chip" data-fuel="CNG" onclick="filterCards('fuel:CNG',this)"><i class="fas fa-wind"></i> CNG</span>
            <span class="uc-chip" data-fuel="Electric" onclick="filterCards('fuel:Electric',this)"><i class="fas fa-bolt"></i> EV</span>
            <div class="ms-auto">
                <select class="uc-select" onchange="sortCards(this.value)">
                    <option value="score">Sort: Best Score</option>
                    <option value="price_asc">Price: Low → High</option>
                    <option value="price_desc">Price: High → Low</option>
                    <option value="km_asc">KM: Lowest First</option>
                    <option value="year_desc">Year: Newest First</option>
                </select>
            </div>
        </div>
    </div>
</div>

<!-- MAIN -->
<div class="container" style="padding-top:28px;padding-bottom:60px">

    <div class="uc-stats" id="ucStats" style="display:none">
        <div class="uc-stat"><div class="num" id="statTotal">0</div><div class="lbl">Listed Cars</div></div>
        <div style="width:1px;height:36px;background:#e2e8f0"></div>
        <div class="uc-stat"><div class="num" id="statBest">0</div><div class="lbl">Best Deals</div></div>
        <div style="width:1px;height:36px;background:#e2e8f0"></div>
        <div class="uc-stat"><div class="num" id="statAvgPrice">—</div><div class="lbl">Avg Price</div></div>
        <div style="width:1px;height:36px;background:#e2e8f0"></div>
        <div class="uc-stat"><div class="num" id="statAvgKm">—</div><div class="lbl">Avg KM</div></div>
    </div>

    <div class="uc-grid" id="ucGrid">
        <div class="uc-empty" style="grid-column:1/-1;text-align:center;padding:40px;color:#94a3b8">
            <i class="fas fa-spinner fa-spin" style="font-size:28px;margin-bottom:12px;display:block"></i>
            Loading used car deals...
        </div>
    </div>
</div>

<div th:replace="~{website/fragments/layout :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
let allDeals = [];
const SRC = { spinny:'🔵', cars24:'🟡', olx:'🔴', cardekho:'🟠', carwale:'⚪', dealer:'🏪', direct:'👤' };

function fmt(n) {
    if (!n) return '—';
    if (n >= 100000) return '₹' + (n/100000).toFixed(1) + 'L';
    if (n >= 1000)   return '₹' + Math.round(n/1000) + 'K';
    return '₹' + Math.round(n).toLocaleString('en-IN');
}

async function load() {
    try {
        const r = await fetch('/api/deals/used');
        allDeals = await r.json();
        renderStats(allDeals);
        renderCards(allDeals);
    } catch(e) {
        document.getElementById('ucGrid').innerHTML = '<div class="uc-empty"><i class="fas fa-car-side"></i><h4>No used car deals yet</h4><p>Check back soon or visit our <a href="/vehicles">new cars</a> page.</p></div>';
    }
}

function renderStats(deals) {
    if (!deals.length) return;
    document.getElementById('ucStats').style.display = 'flex';
    document.getElementById('statTotal').textContent = deals.length;
    document.getElementById('statBest').textContent = deals.filter(d => ['BEST_DEAL','GOOD_DEAL'].includes(d.ucDealTag)).length;
    const prices = deals.filter(d => d.ucAskingPrice).map(d => +d.ucAskingPrice);
    if (prices.length) document.getElementById('statAvgPrice').textContent = fmt(prices.reduce((a,b)=>a+b,0)/prices.length);
    const kms = deals.filter(d => d.ucKmDriven).map(d => +d.ucKmDriven);
    if (kms.length) document.getElementById('statAvgKm').textContent = Math.round(kms.reduce((a,b)=>a+b,0)/kms.length).toLocaleString('en-IN') + ' km';
}

function renderCards(deals) {
    const grid = document.getElementById('ucGrid');
    if (!deals.length) {
        grid.innerHTML = '<div class="uc-empty"><i class="fas fa-car-side"></i><h4>No used car listings yet</h4><p>Admin can add listings from Deal Management.</p></div>';
        return;
    }
    grid.innerHTML = deals.map(d => {
        const tag = d.ucDealTag || 'NORMAL';
        const score = +(d.ucDealScore || 0);
        const scoreColor = score>=80?'#16a34a':score>=60?'#2563eb':score>=40?'#d97706':'#dc2626';
        const tagLabel = {BEST_DEAL:'🏆 Best Deal',GOOD_DEAL:'👍 Good Deal',NORMAL:'Listed',OVERPRICED:'⚠ Overpriced'}[tag]||tag;
        const specs = [
            d.ucYear ? `<div class="uc-spec"><i class="fas fa-calendar"></i>${d.ucYear}</div>` : '',
            d.ucKmDriven ? `<div class="uc-spec"><i class="fas fa-road"></i>${(+d.ucKmDriven).toLocaleString('en-IN')} km</div>` : '',
            d.ucFuelType ? `<div class="uc-spec"><i class="fas fa-gas-pump"></i>${d.ucFuelType}</div>` : '',
            d.ucTransmission ? `<div class="uc-spec"><i class="fas fa-cog"></i>${d.ucTransmission}</div>` : '',
            d.ucOwnerType ? `<div class="uc-spec"><i class="fas fa-user"></i>${d.ucOwnerType} Owner</div>` : '',
            d.ucColor ? `<div class="uc-spec"><i class="fas fa-palette"></i>${d.ucColor}</div>` : ''
        ].filter(Boolean).join('');

        return `
        <a href="/used-cars/${d.id}" class="uc-card" style="text-decoration:none;display:block;color:inherit"
             data-tag="${tag}" data-fuel="${d.ucFuelType||''}"
             data-price="${d.ucAskingPrice||0}" data-km="${d.ucKmDriven||0}"
             data-year="${d.ucYear||0}" data-score="${score}">
            <div class="uc-card-img">
                ${d.vehicleImageUrl
                    ? `<img src="${d.vehicleImageUrl}" alt="${d.vehicleName||''}" loading="lazy" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
                    : ''}
                <div class="no-img" style="${d.vehicleImageUrl ? 'display:none' : ''}"><i class="fas fa-car-side"></i></div>
                <span class="uc-deal-tag tag-${tag}">${tagLabel}</span>
                <span class="uc-source">${SRC[d.ucSourceWebsite]||'📋'} ${(d.ucSourceWebsite||'Listed').toUpperCase()}</span>
            </div>
            <div class="uc-card-body">
                <div class="uc-car-name">${d.vehicleName||'Used Car'}</div>
                <div class="uc-variant">${d.title||[d.ucRegistrationState,d.city].filter(Boolean).join(' · ')||'&nbsp;'}</div>
                <div class="uc-specs">${specs||'<div class="uc-spec"><i class="fas fa-info-circle"></i>Details on enquiry</div>'}</div>
                <div class="uc-price-row">
                    <div>
                        <div class="uc-price">${d.ucAskingPrice ? fmt(+d.ucAskingPrice) : 'Price on request'}</div>
                        ${d.cashDiscount>0?`<div style="font-size:11px;color:#16a34a"><i class="fas fa-tag"></i> ₹${(+d.cashDiscount).toLocaleString('en-IN')} negotiable</div>`:''}
                    </div>
                    ${score>0?`<div class="text-end"><div class="uc-score-num">${score}</div><div class="uc-score-label">Deal Score</div></div>`:''}
                </div>
                ${score>0?`<div class="uc-score-bar"><div class="uc-score-fill" style="width:${score}%;background:${scoreColor}"></div></div>`:''}
                <div class="uc-meta">
                    <span><i class="fas fa-store" style="color:#EF4A23"></i> ${d.dealerName||'Available'}</span>
                    ${d.city?`<span><i class="fas fa-map-marker-alt"></i> ${d.city}</span>`:''}
                </div>
                <div class="uc-cta">
                    <span class="uc-btn-primary" style="display:flex;align-items:center;justify-content:center;gap:4px">
                        <i class="fas fa-eye"></i> View Details
                    </span>
                    ${d.ucListingUrl?`<span class="uc-btn-outline" title="View original listing"><i class="fas fa-external-link-alt"></i></span>`:''}
                </div>
            </div>
        </a>`;
    }).join('');
}

function filterCards(val, el) {
    document.querySelectorAll('.uc-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    document.querySelectorAll('.uc-card').forEach(card => {
        const show = val === 'ALL'
            || (val === 'BEST_DEAL' && card.dataset.tag === 'BEST_DEAL')
            || (val === 'GOOD_DEAL' && ['GOOD_DEAL','BEST_DEAL'].includes(card.dataset.tag))
            || (val.startsWith('fuel:') && card.dataset.fuel === val.split(':')[1]);
        card.style.display = show ? 'block' : 'none';
    });
}

function sortCards(val) {
    const s = [...allDeals].sort((a,b) => {
        if (val==='price_asc')  return (+a.ucAskingPrice||0)-(+b.ucAskingPrice||0);
        if (val==='price_desc') return (+b.ucAskingPrice||0)-(+a.ucAskingPrice||0);
        if (val==='km_asc')     return (+a.ucKmDriven||0)-(+b.ucKmDriven||0);
        if (val==='year_desc')  return (+b.ucYear||0)-(+a.ucYear||0);
        return (+b.ucDealScore||0)-(+a.ucDealScore||0);
    });
    renderCards(s);
}

function enquire(name, city) {
    const msg = encodeURIComponent(`Hi, I'm interested in the used ${name}${city?' in '+city:''}. Please share details.`);
    window.open('https://wa.me/?text='+msg, '_blank');
}

load();
</script>
</body>
</html>
