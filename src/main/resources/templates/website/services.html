<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${seo?.seoTitle != null ? seo.seoTitle : 'Services'}">Services</title>
    <meta th:if="${seo?.metaDescription != null}" name="description" th:content="${seo.metaDescription}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/website.css}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark fixed-top" id="mainNav">
    <div class="container">
        <a class="navbar-brand fw-700" href="/"><i class="fas fa-bolt me-2"></i>CarDekho Deals</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="/about">About</a></li>
                <li class="nav-item"><a class="nav-link active" href="/services">Services</a></li>
                <li class="nav-item"><a class="nav-link" href="/contact">Contact</a></li>
            </ul>
        </div>
    </div>
</nav>

<section class="page-hero">
    <div class="container text-center">
        <h1 th:text="${content_hero?.heading != null ? content_hero.heading : 'Our Services'}">Our Services</h1>
        <p th:text="${content_hero?.subheading != null ? content_hero.subheading : 'What we offer'}"></p>
    </div>
</section>

<section class="section-pad bg-light">
    <div class="container">
        <div class="row g-4">
            <div th:each="c : ${contentList}" th:unless="${c.sectionName == 'hero'}" class="col-md-4">
                <div class="service-card">
                    <img th:if="${c.imageUrl != null}" th:src="${c.imageUrl}"
                         alt="Service" class="img-fluid mb-3 rounded-3" style="height:180px;object-fit:cover;width:100%">
                    <h5 th:text="${c.heading}"></h5>
                    <p th:text="${c.description}"></p>
                    <a th:if="${c.buttonLink != null}" th:href="${c.buttonLink}"
                       class="btn btn-sm btn-outline-primary" th:text="${c.buttonText}"></a>
                </div>
            </div>
        </div>
    </div>
</section>

<footer class="site-footer">
    <div class="container text-center footer-copy">&copy; 2024 CarDekho Deals. All rights reserved.</div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/website.js}"></script>
</body>
</html>
