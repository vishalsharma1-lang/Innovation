<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${seo != null ? seo.seoTitle : 'New Cars — Prices, Specs & Deals | CarDekho Deals'}">New Cars</title>
    <meta th:if="${seo != null}" name="description" th:content="${seo.metaDescription}">
    <meta th:if="${seo != null}" name="keywords" th:content="${seo.keywords}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/website.css}" rel="stylesheet">
</head>
<body>

<div th:replace="~{website/fragments/layout :: nav('vehicles')}"></div>

<section class="page-hero">
    <div class="container">
        <div class="page-hero-breadcrumb">
            <a href="/">Home</a>
            <span>/</span>
            <span style="color:rgba(255,255,255,0.8)">New Cars</span>
        </div>
        <h1>New Cars in India</h1>
        <p th:text="${vehicles != null ? vehicles.size() + ' cars available with latest prices & dealer offers' : 'Explore our complete range of new cars'}">
            Explore our complete range of new cars
        </p>
    </div>
</section>

<section class="section-pad bg-light">
    <div class="container">

        <!-- Brand filters -->
        <div class="brand-filter-scroll" th:if="${brands != null and !brands.isEmpty()}">
            <a href="/vehicles" class="brand-filter-chip active">All Brands</a>
            <a th:each="brand : ${brands}"
               th:href="@{/brand/{slug}(slug=${#strings.toLowerCase(#strings.replace(brand,' ','-'))})}"
               class="brand-filter-chip"
               th:text="${brand}">Brand</a>
        </div>

        <!-- Toolbar -->
        <div class="mb-4 d-flex align-items-center gap-2" th:if="${searchQuery != null and !searchQuery.isEmpty()}">
            <span class="text-muted small">Active Search:</span>
            <span class="badge bg-secondary px-3 py-2 rounded-pill d-inline-flex align-items-center gap-2" style="font-size: 13px; font-weight: 500;">
                <span th:text="${searchQuery}">Search Query</span>
                <a href="/vehicles" class="text-white text-decoration-none" style="opacity: 0.8; font-size: 11px;"><i class="fas fa-times"></i></a>
            </span>
        </div>

        <div class="listing-toolbar d-flex flex-wrap align-items-center justify-content-between gap-3">
            <div class="listing-count">
                Showing <strong th:text="${vehicles != null ? vehicles.size() : 0}">0</strong> cars
            </div>
            <div class="d-flex align-items-center gap-2">
                <label for="vehicleSort" class="text-muted small mb-0">Sort by:</label>
                <select id="vehicleSort" class="listing-sort-select" aria-label="Sort vehicles">
                    <option value="default">Recommended</option>
                    <option value="price-asc">Price: Low to High</option>
                    <option value="price-desc">Price: High to Low</option>
                    <option value="name-asc">Name: A to Z</option>
                    <option value="name-desc">Name: Z to A</option>
                </select>
            </div>
        </div>

        <!-- Vehicle grid -->
        <div class="row g-4" id="vehicleGrid">
            <div th:each="vehicle : ${vehicles}"
                 class="col-md-6 col-lg-4 d-flex"
                 data-vehicle-card
                 th:attr="data-price=${vehicle.startingPrice}, data-name=${vehicle.name}">
                <div th:replace="~{website/fragments/layout :: vehicleCard(${vehicle}, ${vehicleDeals})}"></div>
            </div>

            <div th:if="${#lists.isEmpty(vehicles)}" class="col-12">
                <div class="empty-state">
                    <i class="fas fa-car d-block"></i>
                    <h5>No cars available yet</h5>
                    <p class="text-muted">Check back soon for the latest models and deals.</p>
                    <a href="/" class="btn btn-primary-gradient mt-2">Back to Home</a>
                </div>
            </div>
        </div>
    </div>
</section>

<div th:replace="~{website/fragments/layout :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/website.js}"></script>
</body>
</html>
