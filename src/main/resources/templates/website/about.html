<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${seo?.seoTitle != null ? seo.seoTitle : 'About Us'}">About Us</title>
    <meta th:if="${seo?.metaDescription != null}" name="description" th:content="${seo.metaDescription}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/website.css}" rel="stylesheet">
    <link th:href="@{/css/theme.css}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark fixed-top" id="mainNav">
    <div class="container">
        <a class="navbar-brand fw-700" href="/"><i class="fas fa-bolt me-2"></i>CarDekho Deals</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                <li class="nav-item"><a class="nav-link active" href="/about">About</a></li>
                <li class="nav-item"><a class="nav-link" href="/services">Services</a></li>
                <li class="nav-item"><a class="nav-link" href="/contact">Contact</a></li>
            </ul>
        </div>
    </div>
</nav>

<section class="page-hero">
    <div class="container text-center">
        <h1 th:text="${content_hero?.heading != null ? content_hero.heading : 'About Us'}">About Us</h1>
        <p th:text="${content_hero?.subheading != null ? content_hero.subheading : 'Learn about our story and mission'}"></p>
    </div>
</section>

<section class="section-pad bg-white">
    <div class="container">
        <div class="row g-5 align-items-center">
            <div class="col-lg-6">
                <h2 th:text="${content_about?.heading != null ? content_about.heading : 'Our Story'}">Our Story</h2>
                <p th:text="${content_about?.description != null ? content_about.description : 'We are a passionate team of developers building great software.'}"></p>
                <a th:href="${content_about?.buttonLink != null ? content_about.buttonLink : '/contact'}"
                   class="btn btn-primary-gradient"
                   th:text="${content_about?.buttonText != null ? content_about.buttonText : 'Get in Touch'}">
                </a>
            </div>
            <div class="col-lg-6">
                <img th:if="${content_about?.imageUrl != null}" th:src="${content_about.imageUrl}"
                     alt="About" class="img-fluid rounded-4">
                <div th:unless="${content_about?.imageUrl != null}" class="about-placeholder">
                    <i class="fas fa-users fa-4x text-primary"></i>
                </div>
            </div>
        </div>
    </div>
</section>

<footer class="site-footer">
    <div class="container text-center footer-copy">
        &copy; 2024 CarDekho Deals. All rights reserved.
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/website.js}"></script>
</body>
</html>
