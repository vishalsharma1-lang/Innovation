<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${seo?.seoTitle != null ? seo.seoTitle : 'Contact Us'}">Contact</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/website.css}" rel="stylesheet">
    <link th:href="@{/css/theme.css}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark fixed-top" id="mainNav">
    <div class="container">
        <a class="navbar-brand fw-700" href="/"><i class="fas fa-bolt me-2"></i>CarDekho Deals</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="/about">About</a></li>
                <li class="nav-item"><a class="nav-link" href="/services">Services</a></li>
                <li class="nav-item"><a class="nav-link active" href="/contact">Contact</a></li>
            </ul>
        </div>
    </div>
</nav>
<section class="page-hero">
    <div class="container text-center">
        <h1 th:text="${content_hero?.heading != null ? content_hero.heading : 'Contact Us'}">Contact Us</h1>
        <p th:text="${content_hero?.subheading != null ? content_hero.subheading : 'Get in touch with us'}"></p>
    </div>
</section>
<section class="section-pad bg-white">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="card border-0 shadow-sm p-4">
                    <h5 class="mb-4">Send us a message</h5>
                    <form>
                        <div class="mb-3"><input type="text" class="form-control" placeholder="Your Name"></div>
                        <div class="mb-3"><input type="email" class="form-control" placeholder="Email Address"></div>
                        <div class="mb-3"><textarea class="form-control" rows="4" placeholder="Your Message"></textarea></div>
                        <button type="submit" class="btn btn-primary-gradient w-100">Send Message</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
<footer class="site-footer">
    <div class="container text-center footer-copy">&copy; 2024 CarDekho Deals. All rights reserved.</div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/website.js}"></script>
</body>
</html>
